<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WC 2026</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0c0c0c;--s1:#111;--s2:#141414;--s3:#181818;
  --border:#1e1e1e;--border2:#222;
  --text:#f0f0f0;--muted:#666;--muted2:#999;
  /* Statuts — dégradé de roses pour positif, gris pour neutre/négatif */
  --c-gagne:#7dd3b0;--c-gagne-bg:#0a1a13;--c-gagne-border:#1a4033;
  --c-tete:#f0a8c0;--c-tete-bg:#160a0f;--c-tete-border:#2e1220;
  --c-attente:#f0f0f0;--c-attente-bg:#111;--c-attente-border:#222;
  --c-depasse:#888;--c-depasse-bg:#111;--c-depasse-border:#222;
  --c-mort:#444;--c-mort-bg:#0e0e0e;--c-mort-border:#1a1a1a;
  /* Alias legacy */
  --rose:#f0a8c0;--rose-dim:#d4789a;--rose-bg:#160a0f;--rose-mid:#2e1220;
  --green:#7dd3b0;--green-bg:#0a1a13;
  --amber:#888;--amber-bg:#111;--amber-mid:#222;
  --red:#444;--red-bg:#0e0e0e;
  --blue:#f0a8c0;--blue-bg:#160a0f;
}
html{font-size:13px}
body{background:var(--bg);color:var(--text);font-family:'Inter',system-ui,sans-serif;font-weight:400;min-height:100vh;line-height:1.4}

/* ── HEADER ── */
header{position:sticky;top:0;z-index:50;background:var(--bg);border-bottom:1px solid var(--border);padding:0 24px;display:flex;align-items:center;height:48px;gap:24px}
.logo{font-size:11px;font-weight:600;letter-spacing:.18em;text-transform:uppercase;color:var(--text);flex-shrink:0}
.h-stats{display:flex;gap:20px;margin-left:auto;flex-wrap:wrap}
.h-stat{display:flex;align-items:baseline;gap:4px}
.h-stat-n{font-size:15px;font-weight:600;color:var(--rose)}
.h-stat-l{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.1em}

/* ── NAV ── */
nav{background:var(--bg);border-bottom:1px solid var(--border);padding:0 24px;display:flex;align-items:center;gap:4px}
nav button{background:none;border:none;border-bottom:1px solid transparent;color:var(--muted);font:10px/1 'Inter',sans-serif;font-weight:500;letter-spacing:.12em;text-transform:uppercase;padding:12px 12px;cursor:pointer;transition:color .12s,border-color .12s;margin-bottom:-1px}
nav button:hover{color:var(--text)}
nav button.active{color:var(--text);border-bottom-color:var(--text)}
.nav-sep{flex:1}
.expand-all-btn{font-size:9px;font-weight:500;letter-spacing:.08em;text-transform:uppercase;background:var(--s2);border:1px solid var(--border2);color:var(--muted);padding:4px 10px;border-radius:6px;cursor:pointer;transition:all .1s}
.expand-all-btn:hover{color:var(--text);border-color:var(--muted)}

/* ── MAIN ── */
main{padding:20px 24px}
.tab{display:none}.tab.active{display:block}
.label{font-size:10px;font-weight:500;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid var(--border)}

/* ── KPI ── */
.kpi-row{display:flex;gap:0;margin-bottom:20px;border-bottom:1px solid var(--border2);border-top:1px solid var(--border2)}
.kpi{flex:1;background:transparent;padding:12px 14px;border-right:1px solid var(--border2)}
.kpi-n{font-size:22px;font-weight:300;line-height:1}
.kpi-l{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.1em;margin-top:4px}
.kpi-sub{font-size:10px;color:var(--muted2);margin-top:2px}

/* ── GAINS ROW ── */
.gains-row{display:flex;gap:0;margin-bottom:20px;border-bottom:1px solid var(--border2);border-top:1px solid var(--border2)}
.gain-kpi{flex:1;background:transparent;padding:12px 14px;border-right:1px solid var(--border2)}
.gain-n{font-size:18px;font-weight:500;line-height:1}
.gain-l{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.1em;margin-top:4px}

/* ── TETE STRIP ── */
.tete-strip{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:20px}
.tete-pill{background:transparent;border:none;border-bottom:1px solid var(--border2);padding:7px 4px}
.tete-pill-name{font-size:13px;font-weight:500;color:var(--rose)}
.tete-pill-sub{font-size:10px;color:var(--muted2);margin-top:2px}
.gagnant-pill{background:var(--green-bg);border:1px solid #1a5040}
.gagnant-pill .tete-pill-name{color:var(--green)}
.pill-cote{color:var(--amber);font-size:10px;font-weight:600}

/* ── ALERT ── */
.alert{border-left:2px solid var(--border2);background:transparent;padding:8px 12px;margin-bottom:2px;font-size:12px;color:var(--muted2);border-bottom:1px solid var(--border)}
.alert.win{border-left-color:var(--green);background:var(--green-bg)}
.alert.close{border-left-color:var(--rose);background:var(--rose-bg)}
.alert.warn{border-left-color:var(--red);background:var(--red-bg)}
.alert strong{color:var(--text);font-weight:500}
.alert .hi{color:var(--rose);font-weight:600}
.alert .ok{color:var(--green);font-weight:600}
.alert .gain-tag{color:var(--amber);font-weight:600}

/* ── FILTERS ── */
.filters{display:flex;gap:7px;margin-bottom:14px;flex-wrap:wrap}
.filters input,.filters select{background:var(--s1);border:1px solid var(--border2);color:var(--text);font:12px 'Inter',sans-serif;padding:5px 9px;border-radius:3px;outline:none;transition:border-color .1s}
.filters input{width:190px}
.filters input::placeholder{color:var(--muted)}
.filters input:focus,.filters select:focus{border-color:var(--rose-dim)}
.filters select option{background:#111}

/* ── JOUEURS ── */
.pgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:5px;margin-bottom:20px}
.pcard{background:transparent;border:none;border-bottom:1px solid var(--border2);padding:9px 4px;transition:opacity .1s}
.pcard.tete   {border-bottom-color:var(--c-tete)}
.pcard.gagnant{border-bottom-color:var(--c-gagne);background:rgba(201,96,126,0.05)}
.pcard.depasse{border-bottom-color:var(--c-depasse)}
.pcard.perdant{border-bottom-color:var(--c-mort);opacity:.5}
.pcard-top{display:flex;align-items:flex-start;justify-content:space-between;gap:6px}
.pcard-name{font-size:13px;font-weight:500;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pcard.tete    .pcard-name{color:var(--c-tete)}
.pcard.gagnant .pcard-name{color:var(--c-gagne);font-weight:700}
.pcard.depasse .pcard-name{color:var(--c-depasse)}
.pcard.perdant .pcard-name{color:var(--c-mort)}
.pcard-count{font-size:11px;color:var(--muted);flex-shrink:0}
.pcard-count.hi{color:var(--rose-dim)}
.pcard-meta{font-size:10px;color:var(--muted);margin-top:3px;display:flex;gap:5px;align-items:center;flex-wrap:wrap}
.cote-badge{font-size:10px;color:var(--muted2);padding:0 2px}
.tbadge{font-size:9px;letter-spacing:.06em;text-transform:uppercase;padding:0 4px;border-radius:6px;font-weight:500}
.tbadge.buteur{background:#111b2e;color:var(--blue)}
.tbadge.passeur{background:#0d2018;color:var(--green)}
.pcard-btns{display:flex;gap:2px;margin-top:7px;flex-wrap:wrap}
.sbtn{flex:1;min-width:0;background:var(--s2);border:1px solid var(--border2);color:var(--muted);font:9px 'Inter',sans-serif;font-weight:500;letter-spacing:.06em;text-transform:uppercase;padding:4px 2px;border-radius:6px;cursor:pointer;transition:all .1s;white-space:nowrap}
.sbtn:hover{color:var(--text);border-color:var(--muted)}
.sbtn.on-attente{background:transparent;color:var(--c-attente);border-color:var(--border2)}
.sbtn.on-tete   {background:var(--c-tete-bg);color:var(--c-tete);border-color:var(--c-tete-border)}
.sbtn.on-gagnant{background:var(--c-gagne-bg);color:var(--c-gagne);border-color:var(--c-gagne-border)}
.sbtn.on-depasse{background:var(--c-depasse-bg);color:var(--c-depasse);border-color:var(--c-depasse-border)}
.sbtn.on-perdant{background:var(--red-bg);color:var(--red);border-color:#6b2a1a}

/* ── TICKETS GRID ── */
.tgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(310px,1fr));gap:7px}

/* ── TCARD ── */
.tcard{background:transparent;border:none;border-bottom:1px solid var(--border2);overflow:hidden;margin-bottom:4px}
.tcard.has-win{border-left:2px solid var(--c-gagne)}
.tcard.has-tete{border-left:2px solid var(--c-tete)}
.tcard.is-dead{opacity:.4;border-left:2px solid var(--c-mort)}
.tcard.is-dead .tcard-nom{text-decoration:line-through;color:var(--c-mort)}
.tcard.has-tete{border-top:1px solid var(--rose-mid)}
.tcard-head{display:flex;align-items:center;gap:7px;padding:8px 4px;background:transparent;border-bottom:1px solid var(--border);cursor:pointer;user-select:none}
.tcard-nom{font-size:13px;font-weight:500;color:var(--text)}
.tcard-sys{font-size:10px;font-weight:500;letter-spacing:.06em;color:var(--muted2);background:transparent;border:1px solid var(--border2);padding:1px 6px;border-radius:4px}
.tcard-prog{display:flex;align-items:center;gap:5px}
.pbar-wrap{width:42px;height:2px;background:var(--border2);border-radius:1px;overflow:hidden}
.pbar{height:100%;border-radius:1px;transition:width .3s}
.tcard-frac{font-size:11px;font-weight:600;color:var(--muted);min-width:24px;text-align:right}
.tcard-gain-head{font-size:10px;font-weight:600;color:var(--amber);margin-left:auto;white-space:nowrap}
.tcard-expand-icon{font-size:9px;color:var(--muted);flex-shrink:0;margin-left:4px}

.tcard-body{padding:4px 0}
.sel{display:flex;align-items:center;gap:6px;padding:2px 3px;border-radius:2px}
.sel.tete   {background:transparent}
.sel.gagnant{background:var(--s2)}
.sel.depasse{opacity:.5}
.sel.perdant{opacity:.3}
.sel-dot{width:5px;height:5px;border-radius:50%;flex-shrink:0}
.sel-dot.attente{background:#2a2a2a}
.sel-dot.tete   {background:var(--rose)}
.sel-dot.gagnant {background:var(--c-gagne)}
.sel-dot.depasse{background:var(--amber)}
.sel-dot.perdant{background:var(--red)}
.sel-name{font-size:12px;flex:1;color:var(--c-attente)}
.sel.tete    .sel-name{color:var(--c-tete);font-weight:500}
.sel.gagnant .sel-name{color:var(--c-gagne);font-weight:600}
.sel.gagnant .sel-name{color:var(--c-gagne);font-weight:500}
.sel-pays{font-size:10px;color:var(--muted2)}
.sel-t{font-size:9px;font-weight:600;color:var(--muted);text-transform:uppercase}
.sel-cote{font-size:10px;color:var(--muted2);padding:0 2px;flex-shrink:0}

/* ── PROBA STRIP ── */
.proba-strip{padding:5px 4px 6px;border-top:1px solid var(--border)}
.proba-label{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.07em;margin-bottom:5px}
.proba-bars{display:flex;gap:3px;align-items:flex-end;height:28px}
.pb-col{display:flex;flex-direction:column;align-items:center;gap:1px;flex:1}
.pb-bar{width:100%;border-radius:1px 1px 0 0;transition:height .3s}
.pb-lbl{font-size:8px;color:var(--muted);white-space:nowrap}
.pb-pct{font-size:8px;color:var(--muted2)}

/* ── TCARD FOOT ── */
.tcard-foot{display:flex;align-items:center;padding:5px 0;border-top:1px solid var(--border);gap:7px}
.tcard-info{font-size:10px;color:var(--muted);flex:1}
.tcard-badge{font-size:9px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;padding:2px 6px;border-radius:6px;border:1px solid transparent}
.tcard-badge.win  {background:var(--green-bg);color:var(--green);border-color:#354d61}
.tcard-badge.close{background:var(--c-tete-bg);color:var(--c-tete);border-color:var(--c-tete-border)}
.tcard-badge.idle {background:var(--s2);color:var(--muted);border-color:var(--border2)}
.tcard-unitaires{font-size:9px;color:var(--muted2)}
.tcard-mise{font-size:9px;color:var(--muted);margin-left:auto}
.tcard-gain-foot{font-size:10px;font-weight:600;color:var(--amber)}

/* ── DEPLOYED ── */
.deploy-toggle{display:flex;align-items:center;gap:6px;padding:5px 0;border-top:1px solid var(--border);cursor:pointer;background:transparent}
.deploy-toggle:hover .deploy-label{color:var(--text)}
.deploy-icon{font-size:9px;color:var(--muted)}
.deploy-label{font-size:9px;color:var(--muted);letter-spacing:.04em}
.deploy-label span{color:var(--muted2)}
.deploy-gain{font-size:9px;font-weight:500;color:var(--muted2);margin-left:auto}

.deployed-section{border-top:1px solid var(--border);padding-left:4px}
.deploy-level{padding:6px 11px}
.deploy-level-title{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.07em;margin-bottom:4px;display:flex;align-items:center;gap:6px}
.deploy-level-gain{font-size:9px;font-weight:600;color:var(--amber)}

.ut-list{display:flex;flex-direction:column;gap:2px}
.ut-row{display:flex;align-items:center;justify-content:space-between;padding:4px 0;border:none;border-bottom:1px solid var(--border);background:transparent;font-size:10px;gap:8px}
/* GAGNÉ — blanc */
.ut-row.u-win{}
.ut-row.u-win .ut-names{color:var(--c-gagne);font-weight:500}
.ut-row.u-win .ut-gain{color:var(--c-gagne);font-weight:700}
/* PROCHE — rose */
.ut-row.u-close{}
.ut-row.u-close .ut-names{color:var(--rose)}
.ut-row.u-close .ut-gain{color:var(--rose);font-weight:600}
/* VIVANT — gris clair, gain en gris moyen */
.ut-row.u-live{}
.ut-row.u-live .ut-names{color:var(--muted2)}
.ut-row.u-live .ut-gain{color:var(--muted2);font-weight:500}
/* MORT — orange, texte barré */
.ut-row.u-dead{opacity:.5}
.ut-row.u-dead .ut-names{text-decoration:line-through}
.ut-row.u-dead .ut-gain{color:var(--c-mort)}
/* DEFAULT */
.ut-names{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.ut-gain{color:var(--muted);font-size:10px;font-weight:500;flex-shrink:0;min-width:44px;text-align:right}
/* ── TOOLTIP ── */
.ut[data-tip]{cursor:default}
.ut[data-tip]:hover::after{content:attr(data-tip);position:absolute;bottom:calc(100% + 4px);left:50%;transform:translateX(-50%);background:#111;border:1px solid var(--border2);color:var(--text);font-size:9px;padding:4px 7px;border-radius:3px;white-space:nowrap;z-index:100;pointer-events:none}

/* ── LEGEND ── */
.legend{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:14px}
.leg{display:flex;align-items:center;gap:4px;font-size:10px;color:var(--muted)}
.leg-dot{width:6px;height:6px;border-radius:50%}
.empty{color:var(--muted);padding:24px;text-align:center;font-size:12px}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}

/* ── MINI STATUT BOUTONS (inline dans tickets) ── */
.sel-actions{display:flex;gap:2px;margin-left:auto;opacity:0;transition:opacity .15s}
.sel:hover .sel-actions{opacity:1}
.mini-sbtn{background:none;border:1px solid var(--border2);color:var(--muted);font-size:9px;font-weight:600;padding:1px 4px;border-radius:3px;cursor:pointer;transition:all .1s;min-width:16px;text-align:center}
.mini-sbtn:hover{border-color:var(--muted2);color:var(--text)}
.mini-sbtn.on-attente{color:var(--c-attente);border-color:var(--border2)}
.mini-sbtn.on-tete   {color:var(--c-tete);border-color:var(--c-tete-border);background:var(--c-tete-bg)}
.mini-sbtn.on-gagnant{color:var(--c-gagne);border-color:var(--c-gagne-border);background:var(--c-gagne-bg)}
.mini-sbtn.on-depasse{color:var(--c-depasse);border-color:var(--c-depasse-border);background:var(--c-depasse-bg)}
.mini-sbtn.on-perdant{color:var(--c-mort);border-color:var(--c-mort-border);background:var(--c-mort-bg)}

/* ── Navigation & interactivité ── */
.tete-pill:hover{filter:brightness(1.15);transition:filter .15s}
.alert[onclick]{transition:opacity .1s}
.alert[onclick]:hover{opacity:.85}
.leg:hover span{color:var(--text)!important}
.kpi[onclick]{cursor:pointer}
.kpi[onclick]:hover{background:var(--s2)}
/* Distinction renforcée gagnant dans les cards joueurs */
.pcard.gagnant::after{content:'✓';position:absolute;right:8px;top:9px;font-size:10px;color:var(--c-gagne);font-weight:700}
.pcard{position:relative}
/* ── Analyse interactive (donut + barres) ── */
.charts-wrap{display:flex;gap:12px;flex-wrap:wrap;align-items:stretch}
.chart-card{background:var(--s1);border:1px solid var(--border);border-radius:10px;padding:14px 16px;flex:1;min-width:270px}
.chart-title{font-size:10px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:var(--muted2);margin-bottom:12px;display:flex;align-items:center;justify-content:space-between;gap:8px}
.chart-hint{font-weight:400;letter-spacing:0;text-transform:none;font-size:10px;color:var(--muted2);opacity:.7}
.chart-flex{display:flex;gap:16px;align-items:center}
.chart-legend{display:flex;flex-direction:column;gap:4px;flex:1;min-width:0}
.cleg{display:flex;align-items:center;gap:8px;font-size:12px;cursor:pointer;color:#888;padding:4px 8px;border-radius:6px;transition:all .15s;user-select:none}
.cleg:hover{background:rgba(255,255,255,.04)}
.cleg.on{color:var(--text);background:rgba(255,255,255,.07)}
.cleg.dim{opacity:.35}
.cleg-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.cleg-n{margin-left:auto;font-size:11px;color:var(--muted2);font-variant-numeric:tabular-nums}
.cleg.on .cleg-n{color:var(--text)}
.bar-row{display:flex;align-items:center;gap:10px;margin:9px 0}
.bar-lbl{font-size:9.5px;text-transform:uppercase;letter-spacing:.08em;color:var(--muted2);width:62px;flex-shrink:0}
.bar-track{flex:1;height:13px;background:rgba(255,255,255,.05);border-radius:4px;overflow:hidden}
.bar-fill{height:100%;border-radius:4px;transition:width .5s cubic-bezier(.2,.8,.2,1)}
.bar-val{font-size:12px;width:62px;text-align:right;flex-shrink:0;font-variant-numeric:tabular-nums}
.chart-reset{font-size:10px;color:#888;cursor:pointer;border:1px solid var(--border);border-radius:99px;padding:3px 10px;transition:all .15s;user-select:none;display:inline-flex;align-items:center;gap:4px}
.chart-reset:hover{color:var(--text);border-color:var(--muted2)}
/* ── Filtre drapeaux ── */
.flag-row{display:flex;gap:9px;overflow-x:auto;align-items:flex-start;scrollbar-width:none}
.flag-row::-webkit-scrollbar{display:none}
.flag-chip{display:flex;flex-direction:column;align-items:center;gap:2px;cursor:pointer;flex-shrink:0;opacity:.45;transition:opacity .2s,transform .12s;user-select:none;padding:2px 1px;-webkit-tap-highlight-color:transparent}
.flag-chip:hover{opacity:.85}
.flag-chip.active{opacity:1}
.flag-chip:active{transform:scale(.9)}
.fimg{width:36px;height:25px;object-fit:cover;display:block;border-radius:2px;
  -webkit-mask-image:radial-gradient(ellipse 100% 100% at 50% 50%,#000 42%,rgba(0,0,0,.5) 70%,transparent 98%);
  mask-image:radial-gradient(ellipse 100% 100% at 50% 50%,#000 42%,rgba(0,0,0,.5) 70%,transparent 98%);
  filter:saturate(.7) brightness(.78);transition:filter .25s}
.flag-chip.active .fimg{filter:saturate(1.05) brightness(1)}
.flag-n{font-size:8.5px;color:var(--muted2);font-variant-numeric:tabular-nums;line-height:1}
.flag-chip.active .flag-n{color:var(--rose)}
.flag-bar{width:16px;height:2px;border-radius:99px;background:transparent;transition:background .2s}
.flag-chip.active .flag-bar{background:var(--rose)}
.flag-chip.reset{opacity:.6;width:36px;height:25px;border:1px dashed var(--border);border-radius:5px;align-items:center;justify-content:center;display:flex;flex-direction:row;color:#888;font-size:12px}
.flag-chip.reset:hover{opacity:1;color:var(--text)}

/* ── Paliers intermédiaires ── */
.palier-strip{display:flex;flex-wrap:wrap;align-items:center;gap:5px;padding:7px 10px;border-top:1px solid var(--border)}
.palier-strip-lbl{font-size:8px;text-transform:uppercase;letter-spacing:.1em;color:var(--muted2);margin-right:2px}
.palier-chip{display:inline-flex;align-items:center;gap:6px;font-size:9.5px;padding:3px 8px;border-radius:4px;border:1px solid var(--border2);color:var(--muted2);background:var(--s2);line-height:1.2}
.palier-chip .pk{font-weight:600;font-variant-numeric:tabular-nums}
.palier-chip .pl{opacity:.85}
.palier-gain{font-variant-numeric:tabular-nums;font-weight:600}
.palier-chip.atteint{color:var(--c-gagne);border-color:var(--c-gagne-border);background:var(--c-gagne-bg)}
.palier-chip.next{color:var(--c-tete);border-color:var(--c-tete-border);background:var(--c-tete-bg)}
.palier-chip.mort{color:var(--c-mort);border-color:var(--c-mort-border);background:var(--c-mort-bg)}
.palier-chip.mort .pk{text-decoration:line-through}
.next-palier-mini{font-size:9px;color:var(--c-tete);white-space:nowrap}
.palier-stack{display:flex;height:4px;border-radius:99px;overflow:hidden;gap:1px;margin:6px 10px 8px;background:rgba(255,255,255,.04)}
.palier-stack>div{height:100%}
.mini-rows{display:flex;flex-direction:column;gap:6px;margin-top:4px}
.mini-row{display:flex;align-items:center;gap:8px;font-size:11px;color:#888;cursor:pointer;user-select:none;padding:2px 4px;border-radius:5px;transition:background .15s}
.mini-row:hover{background:rgba(255,255,255,.05);color:var(--text)}
.mini-lbl{width:96px;flex-shrink:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.mini-track{flex:1;height:5px;background:rgba(255,255,255,.06);border-radius:99px;overflow:hidden}
.mini-fill{height:100%;border-radius:99px}
.mini-val{flex-shrink:0;font-size:10px;font-variant-numeric:tabular-nums;min-width:62px;text-align:right;color:#888}
.p-mini-track{height:3px;background:rgba(255,255,255,.06);border-radius:99px;overflow:hidden;margin-top:5px}

/* ── PALIER BAR CHART ── */
.palier-bars{padding:8px 4px 6px;border-top:1px solid var(--border)}
.palier-bars-title{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.1em;margin-bottom:7px}
.palier-bar-row{display:flex;align-items:center;gap:8px;margin-bottom:4px}
.palier-bar-lbl{font-size:9px;color:var(--muted2);width:28px;flex-shrink:0;text-align:right;font-variant-numeric:tabular-nums}
.palier-bar-track{flex:1;height:10px;background:rgba(255,255,255,.04);border-radius:2px;overflow:hidden;position:relative}
.palier-bar-fill{height:100%;border-radius:2px;transition:width .5s cubic-bezier(.2,.8,.2,1)}
.palier-bar-val{font-size:9px;width:52px;text-align:right;flex-shrink:0;font-variant-numeric:tabular-nums;color:var(--muted)}
.palier-bar-row.atteint .palier-bar-lbl{color:var(--c-gagne)}
.palier-bar-row.atteint .palier-bar-val{color:var(--c-gagne);font-weight:600}
.palier-bar-row.next .palier-bar-lbl{color:var(--c-tete)}
.palier-bar-row.next .palier-bar-val{color:var(--c-tete)}
.palier-bar-row.mort .palier-bar-lbl{color:var(--muted);opacity:.4}
.palier-bar-row.mort .palier-bar-val{color:var(--muted);opacity:.4}

/* ── TICKET OVERLAY (fiche déployée plein écran) ── */
.tcard-overlay{
  position:fixed;inset:0;z-index:200;
  display:flex;align-items:flex-start;justify-content:center;
  background:rgba(0,0,0,.7);
  backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);
  opacity:0;pointer-events:none;
  transition:opacity .2s ease;
}
.tcard-overlay.open{opacity:1;pointer-events:all}
.tcard-sheet{
  background:var(--s1);border:1px solid var(--border2);border-radius:6px;
  width:min(900px,97vw);max-height:92vh;overflow-y:auto;
  margin-top:32px;
  transform:translateY(18px);
  transition:transform .25s cubic-bezier(.2,.8,.2,1);
  scrollbar-width:thin;
}
.tcard-overlay.open .tcard-sheet{transform:translateY(0)}
.tcard-sheet-head{
  display:flex;align-items:center;gap:10px;
  padding:14px 18px;
  border-bottom:1px solid var(--border);
  position:sticky;top:0;background:var(--s1);z-index:1;
}
.tcard-sheet-close{
  margin-left:auto;background:none;border:1px solid var(--border2);
  color:var(--muted);font-size:13px;padding:3px 10px;border-radius:3px;
  cursor:pointer;transition:all .1s;
}
.tcard-sheet-close:hover{color:var(--text);border-color:var(--muted)}
.tcard-sheet-body{padding:16px 18px;display:grid;grid-template-columns:1fr 1fr;gap:20px;align-items:start}
.tcard-sheet-col{display:flex;flex-direction:column;gap:12px}
.tcard-sheet-section{font-size:10px;font-weight:500;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);margin-bottom:8px;padding-bottom:6px;border-bottom:1px solid var(--border)}
.sheet-sel{display:flex;align-items:center;gap:8px;padding:5px 0;border-bottom:1px solid var(--border)}
.sheet-sel:last-child{border-bottom:none}
.sheet-sel-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.sheet-sel-name{font-size:13px;font-weight:500;flex:1}
.sheet-sel.tete .sheet-sel-name{color:var(--c-tete)}
.sheet-sel.gagnant .sheet-sel-name{color:var(--c-gagne);font-weight:600}
.sheet-sel.depasse{opacity:.5}
.sheet-sel.perdant{opacity:.3}
.sheet-kpi-row{display:flex;gap:8px}
.sheet-kpi{flex:1;background:var(--s2);border:1px solid var(--border);border-radius:4px;padding:10px 12px}
.sheet-kpi-n{font-size:20px;font-weight:300;line-height:1;color:var(--c-tete)}
.sheet-kpi-n.green{color:var(--c-gagne)}
.sheet-kpi-n.muted{color:var(--muted2)}
.sheet-kpi-l{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.1em;margin-top:3px}
@media(max-width:600px){
  .tcard-sheet-body{grid-template-columns:1fr}
  .tcard-sheet{margin-top:16px;max-height:95vh}
}

function pays3(p){

function _arcPath(cx,cy,r,ir,a0,a1){

    ' L'+xi1.toFixed(2)+' '+yi1.toFixed(2)+' A'+ir+' '+ir+' 0 '+lg+' 0 '+xi0.toFixed(2)+' '+yi0.toFixed(2)+' Z';
}
function donutSVG(data,selKey,cbName,centerTop,centerSub){
  var total=0,nSeg=0;
  data.forEach(function(d){total+=d.value;if(d.value>0)nSeg++;});

function combN(n,k){if(k>n||k<0)return 0;if(k===0||k===n)return 1;let r=1;for(let i=0;i<k;i++)r=r*(n-i)/(i+1);return Math.round(r);}
function combinations(arr,k){if(k===0)return[[]];if(arr.length<k)return[];const[f,...r]=arr;return[...combinations(r,k-1).map(c=>[f,...c]),...combinations(r,k)];}
function countUnitaires(sys){const[k,n]=sys.split('/').map(Number);let t=0;for(let i=k;i<=n;i++)t+=combN(n,i);return t;}
function getDeployedCombos(ticket){const[kMin,n]=ticket.systeme.split('/').map(Number);const combos=[];for(let k=kMin;k<=n;k++)combinations(ticket.selections,k).forEach(c=>combos.push({k,sels:c}));return combos;}

// ── PALIERS INTERMÉDIAIRES DE GAINS ──────────────────────
// Pour chaque palier k (de kMin à n) : gains du SEUL niveau k (pas cumulés),
// joueurs manquants pour l'atteindre, état (atteint / en jeu / mort).
function palierData(t){
  const[kMin,n]=t.systeme.split('/').map(Number);
  const ac=activeCount(t);
  const aliveN=t.selections.filter(s=>status(s.joueur,s.pays,s.type)!=='perdant').length;
  const levels=[];
  for(let k=kMin;k<=n;k++){
    let pot=0,acquis=0,morts=0,nb=0;
    combinations(t.selections,k).forEach(sels=>{
      nb++;
      const cs=comboStatus(sels);
      if(cs==='dead'){morts++;return;}
      const g=comboGainTotal(sels);
      if(g===null)return;
      if(cs==='finalized')acquis+=g;else pot+=g;
    });
    levels.push({k,n,manque:Math.max(0,k-ac),atteint:ac>=k,mort:aliveN<k,pot,acquis,morts,nb});
  }
  const next=levels.find(l=>!l.atteint&&!l.mort)||null; // prochain palier accessible
  const reached=levels.filter(l=>l.atteint&&!l.mort).pop()||null;
  return{levels,next,reached,ac,kMin,n,aliveN};
}

// Chips de paliers pour une carte ticket
function palierBarsHTML(pd) {
  if (!pd || !pd.levels || !pd.levels.length) return '';
  // Max value for scale
  const maxVal = Math.max(...pd.levels.map(l => l.pot + l.acquis), 1);
  const rows = pd.levels.map(l => {
    const total = l.pot + l.acquis;
    const pct = Math.round(total / maxVal * 100);
    const cls = l.mort ? 'mort' : l.atteint ? 'atteint' : (pd.next && l.k === pd.next.k ? 'next' : '');
    const color = l.mort ? 'rgba(255,255,255,.08)' : l.atteint ? 'var(--c-gagne)' : (pd.next && l.k === pd.next.k ? 'var(--c-tete)' : 'rgba(255,255,255,.15)');
    const valStr = l.mort ? '—' : (l.acquis > 0 && l.pot > 0)
      ? `<span style="color:var(--c-gagne)">${fmt(l.acquis)}</span><span style="color:var(--muted)"> +${fmt(l.pot)}</span>`
      : l.acquis > 0 ? `<span style="color:var(--c-gagne)">${fmt(l.acquis)}</span>`
      : `+${fmt(l.pot)}`;
    return `<div class="palier-bar-row ${cls}">
      <span class="palier-bar-lbl">${l.k}/${l.n}</span>
      <div class="palier-bar-track"><div class="palier-bar-fill" style="width:${pct}%;background:${color}"></div></div>
      <span class="palier-bar-val">${valStr}</span>
    </div>`;
  }).join('');
  return `<div class="palier-bars"><div class="palier-bars-title">Gains par palier</div>${rows}</div>`;
}

function palierChips(pd){
  return'<div class="palier-strip"><span class="palier-strip-lbl">Paliers</span>'+pd.levels.map(l=>{
    const cls=l.mort?'mort':l.atteint?'atteint':(pd.next&&l.k===pd.next.k?'next':'');

    const amt=l.mort?'':(l.acquis>0?fmt(l.acquis)+(l.pot>0?' <span style="opacity:.7">+'+fmt(l.pot)+'</span>':''):'+'+fmt(l.pot));
    return`<div class="palier-chip ${cls}" title="Palier ${l.k}/${l.n} · ${l.nb} combinaison${l.nb>1?'s':''}${l.morts?' · '+l.morts+' morte'+(l.morts>1?'s':''):''}${l.atteint?' · atteint':l.mort?' · mort':' · il manque '+l.manque+' joueur'+(l.manque>1?'s':'')}"><span class="pk">${l.k}/${l.n}</span><span class="pl">${lbl}</span>${amt?`<span class="palier-gain">${amt}</span>`:''}</div>`;
  }).join('')+'</div>'+palierStack(pd);
}
// Micro-barre : où se situe le potentiel restant (par palier)
function palierStack(pd){
  let tot=0;pd.levels.forEach(l=>{tot+=l.pot+l.acquis;});
  if(tot<=0)return'';
  const segs=pd.levels.map(l=>{
    const v=l.pot+l.acquis;if(v<=0)return'';
    const col=l.atteint?'#d4789a':(pd.next&&l.k===pd.next.k?'#f0a8c0':'#454545');
    return`<div style="width:${(v/tot*100).toFixed(2)}%;background:${col}" title="${l.k}/${l.n} : ${Math.round(v)}€"></div>`;
  }).join('');
  return`<div class="palier-stack" title="Répartition du potentiel par palier">${segs}</div>`;
}

// ─── Supabase client (vanilla, no deps) ───────────────────
const supa = {
  async fetchAll() {
    try {
      const r = await fetch(`${SUPA_URL}/rest/v1/${SUPA_TABLE}?select=player_key,status,updated_at,updated_by&limit=1000`, {
        headers: {
          'apikey': SUPA_KEY,
          'Authorization': `Bearer ${SUPA_KEY}`,
          'Content-Type': 'application/json'
        }
      });
      if (!r.ok) {
        const txt = await r.text();
        console.error('Supabase fetchAll error:', r.status, txt);
        return [];
      }
      return r.json();
    } catch(e) {
      console.error('Supabase fetchAll exception:', e);
      return [];
    }
  },
  async upsert(player_key, status, updated_by = 'manual') {
    // Use PATCH on the specific row via player_key filter (avoids 409 conflict)
    const r = await fetch(`${SUPA_URL}/rest/v1/${SUPA_TABLE}?player_key=eq.${encodeURIComponent(player_key)}`, {
      method: 'PATCH',
      headers: {
        'apikey': SUPA_KEY,
        'Authorization': `Bearer ${SUPA_KEY}`,
        'Content-Type': 'application/json',
        'Prefer': 'return=minimal'
      },
      body: JSON.stringify({ status, updated_at: new Date().toISOString(), updated_by })
    });
    if (r.ok) return true;
    // If row doesn't exist yet, insert it
    if (r.status === 404 || r.status === 0) {
      const r2 = await fetch(`${SUPA_URL}/rest/v1/${SUPA_TABLE}`, {
        method: 'POST',
        headers: {
          'apikey': SUPA_KEY,
          'Authorization': `Bearer ${SUPA_KEY}`,
          'Content-Type': 'application/json',
          'Prefer': 'return=minimal'
        },
        body: JSON.stringify({ player_key, status, updated_at: new Date().toISOString(), updated_by })
      });
      return r2.ok;
    }
    const txt = await r.text();
    console.error('Supabase upsert error:', r.status, txt);
    return false;
  },
  async upsertBatch(rows) {
    // PATCH each row individually
    const results = await Promise.all(rows.map(r => this.upsert(r.player_key, r.status, r.updated_by || 'auto')));
    return results.every(Boolean);
  },
  subscribeChanges(callback) {
    // Supabase Realtime via WebSocket
    const wsUrl = SUPA_URL.replace('https://', 'wss://') + '/realtime/v1/websocket?apikey=' + SUPA_KEY + '&vsn=1.0.0';
    let ws, hb;
    function connect() {
      ws = new WebSocket(wsUrl);
      ws.onopen = () => {
        ws.send(JSON.stringify({ topic: 'realtime:public:player_status', event: 'phx_join', payload: {}, ref: '1' }));
        hb = setInterval(() => ws.readyState === 1 && ws.send(JSON.stringify({ topic: 'phoenix', event: 'heartbeat', payload: {}, ref: '2' })), 25000);
      };
      ws.onmessage = e => {
        try {
          const msg = JSON.parse(e.data);
          if (msg.event === 'INSERT' || msg.event === 'UPDATE') {
            const rec = msg.payload?.record;
            if (rec?.player_key && rec?.status) callback(rec.player_key, rec.status, rec.updated_by || 'auto');
          }
        } catch {}
      };
      ws.onclose = () => { clearInterval(hb); setTimeout(connect, 5000); };
      ws.onerror = () => ws.close();
    }
    connect();
    return () => { clearInterval(hb); ws && ws.close(); };
  }
};

// ─── API-Football scorer auto-refresh ─────────────────────
// Plan gratuit : 100 req/jour — on interroge uniquement les matchs terminés du jour
const API_FOOTBALL_KEY = null; // À renseigner si tu crées un compte api-football.com

async function refreshFromAPIFootball() {
  if (!API_FOOTBALL_KEY) {
    showToast('Clé API-Football non configurée', 'warn');
    return false;
  }
  try {
    showToast('Récupération des scores…', 'info');
    // Récupère les matchs WC2026 du jour terminés
    const today = new Date().toISOString().split('T')[0];
    const r = await fetch(`https://v3.football.api-sports.io/fixtures?league=1&season=2026&date=${today}&status=FT`, {
      headers: { 'x-apisports-key': API_FOOTBALL_KEY }
    });
    if (!r.ok) { showToast('Erreur API-Football', 'error'); return false; }
    const data = await r.json();
    const fixtures = data.response || [];
    if (!fixtures.length) { showToast('Aucun match terminé aujourd\'hui', 'info'); return false; }

    // Pour chaque match, récupère les stats joueurs
    const updates = [];
    for (const fix of fixtures) {
      const fid = fix.fixture.id;
      const homeTeam = fix.teams.home.name;
      const awayTeam = fix.teams.away.name;
      const sr = await fetch(`https://v3.football.api-sports.io/fixtures/players?fixture=${fid}`, {
        headers: { 'x-apisports-key': API_FOOTBALL_KEY }
      });
      if (!sr.ok) continue;
      const sd = await sr.json();
      // Calcule le meilleur buteur et passeur par équipe
      for (const teamData of (sd.response || [])) {
        const teamName = teamData.team.name;
        let topScorer = null, topScoreG = 0;
        let topAssist = null, topAssistA = 0;
        for (const p of (teamData.players || [])) {
          const g = p.statistics?.[0]?.goals?.total || 0;
          const a = p.statistics?.[0]?.goals?.assists || 0;
          if (g > topScoreG) { topScoreG = g; topScorer = p.player.name; }
          if (a > topAssistA) { topAssistA = a; topAssist = p.player.name; }
        }
        updates.push({ team: teamName, scorer: topScorer, scoreG: topScoreG, assist: topAssist, assistA: topAssistA });
      }
    }
    // Mappe les noms API-Football → player_keys dans notre DB
    // (mapping approximatif par nom normalisé)
    const allRows = await supa.fetchAll();
    const upserts = [];
    for (const u of updates) {
      if (u.scorer) {
        const norm = u.scorer.toLowerCase().split(' ').pop(); // nom de famille
        const match = allRows.find(r => r.player_key.split('|')[0].includes(norm) && r.player_key.endsWith('buteur'));
        if (match) upserts.push({ player_key: match.player_key, status: 'tete', updated_by: 'auto' });
      }
    }
    if (upserts.length) {
      await supa.upsertBatch(upserts);
      showToast(`${upserts.length} joueur(s) mis à jour`, 'success');
    } else {
      showToast('Aucune mise à jour trouvée', 'info');
    }
    return true;
  } catch(e) {
    showToast('Erreur: ' + e.message, 'error');
    return false;
  }
}

function buildSheetCombos(t, filterK) {
  const combos = getDeployedCombos(t);
  const [kMin] = t.systeme.split('/').map(Number);
  const statusColors = {gagnant:'var(--c-gagne)',tete:'var(--c-tete)',attente:'var(--muted2)',depasse:'var(--muted)',perdant:'var(--c-mort)'};
  const filtered = filterK ? combos.filter(c => c.k === filterK) : combos;
  
  // Group by k
  const groups = {};
  filtered.forEach(({k, sels}) => { if(!groups[k]) groups[k]=[]; groups[k].push(sels); });

  let html = '';
  for (const k of Object.keys(groups).sort((a,b) => +a - +b)) {
    const g = groups[k];
    let levelAcq = 0, levelPot = 0, levelMort = 0;
    // Sort combos by gain descending (dead last)
    g.sort((a, b) => {
      const ga = comboGainTotal(a) || 0;
      const gb = comboGainTotal(b) || 0;
      const da = comboStatus(a) === 'dead';
      const db = comboStatus(b) === 'dead';
      if (da !== db) return da ? 1 : -1;
      return gb - ga;
    });
    const rows = g.map(sels => {
      const cs = comboStatus(sels);
      const gt = comboGainTotal(sels);
      if (cs === 'dead') { levelMort++; return null; }
      if (gt) { if(cs==='win') levelAcq+=gt; else levelPot+=gt; }
      const names = sels.map(s => {
        const st = status(s.joueur, s.pays, s.type);
        const col = statusColors[st] || 'var(--muted2)';
        const bold = st==='tete'||st==='gagnant' ? 'font-weight:600;' : '';
        const deco = st==='perdant' ? 'text-decoration:line-through;' : '';
        const check = st==='gagnant' ? '✓ ' : '';
        return `<span style="color:${col};${bold}${deco}">${check}${s.joueur.split(' ')[0]}</span>`;
      }).join('<span style="color:var(--muted)"> · </span>');
      const gainChip = gt ? fmt(gt) : '—';
      const rowCls = cs==='win'?'u-win':cs==='close'?'u-close':cs==='live'?'u-live':'';
      return `<div class="ut-row ${rowCls}">
        <span class="ut-names">${names}</span>
        <span class="ut-gain">${gainChip}</span>
      </div>`;
    }).filter(Boolean).join('');

    const allDead = levelMort === g.length;
    const levelInfo = allDead ? `<span style="color:var(--red)">palier mort</span>`
      : levelAcq > 0 ? `<span style="color:var(--c-gagne)">${fmt(levelAcq)}</span>`
      : levelPot > 0 ? `<span style="color:var(--muted2)">${fmt(levelPot)}</span>` : '';

    html += `<div style="margin-bottom:8px">
      <div style="font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;padding:4px 0;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px;margin-bottom:4px">
        <span>${k} sél.</span>
        <span style="color:var(--muted)">${g.length} combinaisons</span>

  const collapse=obj=>{const out={};for(const[k,v]of Object.entries(obj||{})){const nk=reKey(k);if(nk)out[nk]=mergeStatut(out[nk],v);}return out;};
  const base=collapse(RAW.players);
  const saved=(()=>{try{return JSON.parse(localStorage.getItem('wc26_v4')||'{}');}catch{return{};}})();
  P={...base,...collapse(saved)};
  render();
  // Load from Supabase (overrides local)
  loadFromSupabase();
  // Subscribe to realtime changes
  supa.subscribeChanges((player_key, status, by) => {
    P[player_key] = status;
    localStorage.setItem('wc26_v4', JSON.stringify(P));
    render();
    if(by === 'auto') showSyncToast('Mise à jour auto: ' + player_key.split('|')[0]);

  try {
    console.log('Loading from Supabase...');

    if(!rows || !rows.length) {
      console.warn('No rows returned from Supabase');

    rows.forEach(r => { if(r.player_key && r.status) P[r.player_key] = r.status; });
    localStorage.setItem('wc26_v4', JSON.stringify(P));

  localStorage.setItem('wc26_v4', JSON.stringify(P));

function pkey(j,p,t){return paysKeyNorm(j)+'|'+paysKeyNorm(canonPays(p))+'|'+(t||'').trim().toLowerCase();}
function status(j,p,t){const k=pkey(j,p,t);if(P[k])return P[k];const n=paysKeyNorm(j),tp=(t||'').trim().toLowerCase();for(const[key,v]of Object.entries(P)){const parts=key.split('|');if(parts[0]===n&&parts[2]===tp)return v;}return'attente';}
function setStatus(j,p,t,s){
  const k=pkey(j,p,t);
  P[k]=s;
  const n=paysKeyNorm(j),tp=(t||'').trim().toLowerCase();
  for(const key of Object.keys(P)){const parts=key.split('|');if(parts[0]===n&&parts[2]===tp)P[key]=s;}
  save(k, s);
  render();
}
function activeCount(t){return t.selections.filter(s=>['tete','gagnant'].includes(status(s.joueur,s.pays,s.type))).length;}
function finalizedCount(t){return t.selections.filter(s=>status(s.joueur,s.pays,s.type)==='gagnant').length;}
function isFinalized(st){return st==='gagnant';}
function isDead(st){return st==='perdant';}
function minK(sys){return parseInt(sys.split('/')[0]);}
function isWin(t){return activeCount(t)>=minK(t.systeme);}
function isGagne(t){return finalizedCount(t)>=minK(t.systeme);}
function isClose(t){return activeCount(t)===minK(t.systeme)-1;}
function uniquePlayers(){const m=new Map();for(const t of T)for(const s of t.selections){const k=pkey(s.joueur,s.pays,s.type);if(!m.has(k))m.set(k,{joueur:s.joueur.trim(),pays:s.pays.trim(),type:s.type,n:0});m.get(k).n++;}return[...m.values()];}

// ══════════════════════════════════════════════════════════
// GAINS
// ══════════════════════════════════════════════════════════
function comboGainPotentiel(sels){
  // Gain = produit des cotes des joueurs GAGNANTS (tete ou gagnant) * mise
  const actives=sels.filter(s=>['tete','gagnant'].includes(status(s.joueur,s.pays,s.type)));
  if(actives.length!==sels.length)return null;// pas encore complet
  let prod=1;
  for(const s of sels){const c=getCoteForSel(s);if(!c)return null;prod*=c;}
  return prod*UNIT_MISE;
}

function getCoteForSel(s){return s.cote||getCote(s.joueur,s.type);}
function comboGainTotal(sels){
  let prod=1;
  for(const s of sels){
    const c=getCoteForSel(s);
    if(!c)return null;
    prod*=c;
  }
  return prod*UNIT_MISE;
}

function comboStatus(sels){
  const statuses=sels.map(s=>status(s.joueur,s.pays,s.type));
  const nPerdant=statuses.filter(s=>s==='perdant').length;
  const nFinal=statuses.filter(s=>s==='gagnant').length;
  const nActive=statuses.filter(s=>['tete','gagnant'].includes(s)).length;
  const nVivant=statuses.filter(s=>['tete','gagnant','attente','depasse'].includes(s)).length;
  const n=sels.length;
  // Mort : au moins 1 perdant définitif
  if(nPerdant>0)return'dead';
  // Acquis : tous finalisés (gagnant)
  if(nFinal===n)return'finalized';
  // Potentiel : tous actifs (tete/gagnant) mais pas tous finalisés
  if(nActive===n)return'win';
  // Proche : 1 seul manquant et tous les autres actifs
  if(nActive===n-1&&nVivant===n)return'close';
  // Vivant : au moins 1 actif, aucun perdant
  if(nActive>0)return'live';
  return'idle';
}

// Gains consolidés d'un ticket système
function ticketGains(ticket){
  const combos=getDeployedCombos(ticket);
  let acquis=0,potentiel=0,mort=0;
  const mise=combos.length*UNIT_MISE;
  for(const{sels}of combos){
    const cs=comboStatus(sels);
    if(cs==='dead'){mort++;continue;}
    const g=comboGainTotal(sels);
    if(g===null)continue;
    // acquis = finalisé (tous gagnant), potentiel = tout le reste actif
    if(cs==='finalized')acquis+=g;
    else potentiel+=g;
  }
  const allDead=mort===combos.length;
  return{acquis,potentiel,mort,mise,total:acquis+potentiel,allDead,nbCombos:combos.length};
}

// Gains globaux portefeuille
function portfolioGains(){
  let totalMise=0,acquis=0,potentiel=0,mort=0;
  for(const t of T){
    const g=ticketGains(t);
    totalMise+=g.mise;
    acquis+=g.acquis;
    potentiel+=g.potentiel;
    mort+=g.mort;
  }
  return{totalMise,acquis,potentiel,mort,enCours:potentiel};
}

function fmt(v){if(v===null)return'—';if(v===0)return'0€';return Math.round(v)+'€';}

// Parse le gain max attendu depuis le nom du ticket (ex: "142k"→142000, "70k Soso"→70000, "2k7"→2700)
function parseMaxFromName(nom){
  const part=nom.trim().split(' ')[0];
  const m=part.match(/^([\d.]+)k(\d{1,2})?/i);
  if(!m)return null;
  const base=parseFloat(m[1]);
  const suffix=m[2]?parseFloat('0.'+m[2].padEnd(2,'0')):0;
  return Math.round((base+suffix)*1000);
}

function buildProbaStrip(ticket){
  const[kMin,n]=ticket.systeme.split('/').map(Number);
  const ac=activeCount(ticket);
  const levels=[];
  for(let k=kMin;k<=n;k++)levels.push(k);
  if(!levels.length)return'';
  const maxH=20;
  // Distribution visuelle approximative basée sur actifs/total
  const p=ac/n;
  const bars=levels.map(k=>{
    // Binomiale approx
    const h=Math.max(2,Math.round(maxH*Math.exp(-2*Math.pow(k/n-p,2))));
    const isMin=k===kMin;
    const col=k===n?'var(--amber)':isMin?'#2a3a5a':'var(--rose-dim)';
    const pct=Math.round(combN(n,k)*Math.pow(p,k)*Math.pow(1-p,n-k)*100);
    return`<div class="pb-col" title="${k}/${n} : ~${pct}%">
      <div class="pb-bar" style="height:${h}px;background:${col}"></div>
      <div class="pb-lbl" style="color:${isMin?'var(--rose)':'var(--muted)'}">${k}/${n}</div>
    </div>`;
  }).join('');
  return`<div class="proba-strip">
    <div class="proba-label">Distribution probabilités · seuil <span style="color:var(--rose)">${kMin}/${n}</span> · ${ac} actifs</div>
    <div class="proba-bars">${bars}</div>
  </div>`;
}

function buildDeployedSection(ticket){
  const isOpen=DEPLOY_STATE[ticket.id]||false;
  const nbU=countUnitaires(ticket.systeme);
  const mise=nbU*UNIT_MISE;
  const{acquis:ga,potentiel:gp}=ticketGains(ticket);
  const gainStr=ga>0?`${fmt(ga)} acquis`:gp>0?`${fmt(gp)} potentiel`:'';

  const toggleHtml=`<div class="deploy-toggle" onclick="toggleDeploy('${ticket.id}',event)">
    <span class="deploy-icon">${isOpen?'▼':'▶'}</span>
    <span class="deploy-label">${isOpen?'Masquer':'Déployer'} <span>${nbU} unitaires · ${fmt(mise)}</span></span>
    ${gainStr?`<span class="deploy-gain">${gainStr}</span>`:''}
  </div>`;

  if(!isOpen)return toggleHtml;

  const combos=getDeployedCombos(ticket);
  const[kMin]=ticket.systeme.split('/').map(Number);
  const _ac=activeCount(ticket);
  const _aliveN=ticket.selections.filter(s=>status(s.joueur,s.pays,s.type)!=='perdant').length;

  // Grouper par taille
  const groups={};
  combos.forEach(({k,sels})=>{if(!groups[k])groups[k]=[];groups[k].push(sels);});

  let html=toggleHtml+'<div class="deployed-section"><div style="display:flex;gap:12px;align-items:center;padding:5px 0;border-bottom:1px solid var(--border);font-size:9px;flex-wrap:wrap">' +
    '<span style="color:var(--c-gagne-light)">● Acquis</span>' +
    '<span style="color:var(--c-tete)">● Potentiel</span>' +
    '<span style="color:var(--muted2)">● Proche</span>' +
    '<span style="color:var(--muted)">● Vivant</span>' +
    '<span style="color:var(--c-mort)">● Mort</span>' +
    '</div>';
  for(const k of Object.keys(groups).sort((a,b)=>b-a)){
    const g=groups[k];
    const isMinLevel=parseInt(k)===kMin;
    
    // Calcul gains du niveau
    let levelAcquis=0, levelPotentiel=0, levelMort=0;
    const chips=g.map(sels=>{
      const cs=comboStatus(sels);
      const gt=comboGainTotal(sels);
      if(cs==='dead'){levelMort++;return null;}
      if(gt){if(cs==='win')levelAcquis+=gt;else levelPotentiel+=gt;}
      
      // Chip : noms courts + gain
      const statusColors={'gagnant':'var(--c-gagne)','tete':'var(--c-tete)','attente':'var(--muted2)','depasse':'var(--c-depasse)','perdant':'var(--c-mort)'};
      const names=sels.map(s=>{
        const st=status(s.joueur,s.pays,s.type);
        const col=statusColors[st]||'var(--muted2)';
        const deco=st==='perdant'?';text-decoration:line-through':'';
        const bold=st==='gagnant'?';font-weight:700':'';
        const check=st==='gagnant'?'<span style="color:var(--c-gagne);font-size:9px;margin-right:2px;font-weight:700">✓</span>':'';
        return`${check}<span style="color:${col}${deco}${bold}">${s.joueur.split(' ')[0]}</span>`;
      }).join('<span style="color:var(--muted)"> · </span>');
      const gainChip=gt?fmt(gt):'—';
      let cls='';
      if(cs==='win')cls='u-win';
      else if(cs==='close')cls='u-close';
      else if(cs==='live')cls='u-live';
      
      const fullNames=sels.map(s=>`${s.joueur} (${s.pays.trim()})`).join(' · ');
      return`<div class="ut-row ${cls}">
        <span class="ut-names">${names}</span>
        <span class="ut-gain">${gainChip}</span>
      </div>`;
    }).filter(Boolean).join('');

    const allLevelDead=levelMort===g.length;
    const levelGainStr=allLevelDead
      ?`<span style="color:var(--red);text-decoration:line-through">niveau mort</span>`
      :levelAcquis>0?`<span style="color:var(--c-gagne)">${fmt(levelAcquis)} acquis</span>`
      :levelPotentiel>0?`<span style="color:var(--muted2)">${fmt(levelPotentiel)} potentiel</span>`:'';
    const mortStr=levelMort>0&&!allLevelDead?`<span style="color:var(--red);font-size:9px">${levelMort} mort${levelMort>1?'s':''}</span>`:'';

    html+=`<div class="deploy-level">
      <div class="deploy-level-title">
        <span>${k} sél.${isMinLevel?' <span style="color:var(--rose);font-size:8px">seuil min</span>':''} ${_ac>=parseInt(k)?'<span style="color:var(--c-gagne);font-size:8px">✓ palier atteint</span>':_aliveN<parseInt(k)?'<span style="color:var(--c-mort);font-size:8px">palier mort</span>':'<span style="color:var(--c-tete);font-size:8px">manque '+(parseInt(k)-_ac)+'</span>'}</span>
        <span style="display:flex;gap:8px;align-items:center">${levelGainStr}${mortStr}</span>
      </div>
      <div class="ut-list">${chips||'<span style="font-size:9px;color:var(--muted)">Aucun ticket valide</span>'}</div>
    </div>`;
  }
  html+='</div>';
  return html;
}

function renderTickets(){

  if(_tHadFocus){
    const _newTInput=document.getElementById('tsearch');
    if(_newTInput){_newTInput.focus();_newTInput.setSelectionRange(_tCursorPos,_tCursorPos);}
  }
}

function renderAlertes(){
  const wins=T.filter(isWin);
  const close=T.filter(t=>isClose(t)&&!isWin(t));
  const tRows=[...wins,...close].map(t=>{
    const ac=activeCount(t),mk=minK(t.systeme),n=t.selections.length,win=isWin(t);
    const actNames=t.selections.filter(s=>['tete','gagnant'].includes(status(s.joueur,s.pays,s.type))).map(s=>s.joueur).join(', ');
    const waitNames=t.selections.filter(s=>status(s.joueur,s.pays,s.type)==='attente').map(s=>s.joueur).join(', ');
    const{acquis:ga,potentiel:gp}=ticketGains(t);
    const pd=palierData(t);
    const reachedStr=pd.reached?`<span class="ok">palier ${pd.reached.k}/${n} atteint</span> · <span style="color:${pd.reached.acquis>0?'var(--c-gagne-light)':'var(--c-tete)'}">${pd.reached.acquis>0?fmt(pd.reached.acquis)+' acquis':'+'+fmt(pd.reached.pot)+' au palier'}</span>`:'';
    const nextStr=nextPalierStr(pd,false);
    return`<div class="alert ${win?'win':'close'}" onclick="openTicketOverlay('${t.id}')" style="cursor:pointer">
      <strong>${t.nom}</strong> <span style="color:${'var(--muted)'}">${t.systeme}</span>
      &nbsp;·&nbsp; ${ac}/${n} actifs
      ${reachedStr?' &nbsp;·&nbsp; '+reachedStr:''}
      ${nextStr?' &nbsp;·&nbsp; '+nextStr:''}
      <span style="font-size:10px;color:var(--muted2)">· ${ga>0?fmt(ga)+' acquis + ':''}${fmt(gp)} pot. total</span>
      <br><span style="font-size:10px;color:var(--muted)">Actifs : ${actNames||'—'} · En attente : ${waitNames||'—'}</span>
    </div>`;
  }).join('')||'<div class="empty">Aucune alerte active</div>';

  const activePl=uniquePlayers().filter(p=>['tete','gagnant'].includes(status(p.joueur,p.pays,p.type)));
  let isoRows='<div class="empty">Moins de 2 joueurs actifs</div>';
  if(activePl.length>=2){
    const pairs=[];
    for(let i=0;i<activePl.length;i++)for(let j=i+1;j<activePl.length;j++){
      const a=activePl[i],b=activePl[j];
      const shared=T.filter(t=>t.selections.some(s=>s.joueur.trim().toLowerCase()===a.joueur.toLowerCase())&&t.selections.some(s=>s.joueur.trim().toLowerCase()===b.joueur.toLowerCase()));
      pairs.push({a,b,shared});
    }
    pairs.sort((x,y)=>x.shared.length-y.shared.length);
    isoRows=pairs.map(p=>{
      const cls=p.shared.length===0?'warn':p.shared.length===1?'close':'';
      return`<div class="alert ${cls}" style="cursor:default">
        <strong>${p.a.joueur}</strong> + <strong>${p.b.joueur}</strong>
        &nbsp;·&nbsp; ${p.shared.length} ticket${p.shared.length!==1?'s':''} commun${p.shared.length!==1?'s':''}
        <br><span style="font-size:10px;color:var(--muted)">${p.shared.map(t=>t.nom).join(', ')||'aucun'}</span>
      </div>`;
    }).join('');
  }

  document.getElementById('alertes').innerHTML=`
    <div class="label">Tickets gagnants et proches du seuil</div>${tRows}
    <div class="label" style="margin-top:20px">Couverture entre joueurs actifs</div>${isoRows}`;
}


// ── NAVIGATION depuis le dashboard ──────────────────────
function filterByStatus(s){
  const el=document.getElementById('psf');
  if(el){el.value=s;renderJoueurs();}
}

function goToPlayer(joueur){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('nav button:not(.expand-all-btn)').forEach(b=>b.classList.remove('active'));
  const btn=document.querySelector('nav button[onclick*="joueurs"]');
  if(btn)btn.classList.add('active');
  document.getElementById('joueurs').classList.add('active');
  // Pre-fill search and render
  setTimeout(function(){
    const el=document.getElementById('psearch');
    if(el){el.value=joueur;renderJoueurs();}
    setTimeout(function(){
      const card=document.querySelector('.pcard');
      if(card)card.scrollIntoView({behavior:'smooth',block:'start'});
    },80);
  },20);
}

function goToTicket(ticketId){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('nav button:not(.expand-all-btn)').forEach(b=>b.classList.remove('active'));
  const btn=document.querySelector('nav button[onclick*="tickets"]');
  if(btn)btn.classList.add('active');
  document.getElementById('tickets').classList.add('active');
  DEPLOY_STATE[ticketId]=true;
  renderTickets();
  setTimeout(function(){
    const el=document.querySelector('[data-id="'+ticketId+'"]');
    if(el&&el.scrollIntoView)el.scrollIntoView({behavior:'smooth',block:'start'});
  },80);
}

function goTab(id,btn){
  document.querySelectorAll('.tab').forEach(el=>el.classList.remove('active'));
  document.querySelectorAll('nav button:not(.expand-all-btn)').forEach(el=>el.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  btn.classList.add('active');
  render();
}

init();
</script>
