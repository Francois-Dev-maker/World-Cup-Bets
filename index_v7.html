<!DOCTYPE html>
<html lang="fr"><head><meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes"><meta name="theme-color" content="#0c0c0e">
<title>WC 2026</title>
<style>:root{--bg:#0c0c0e;--panel:#161618;--panel2:#1e1e21;--line:#2a2a2d;--text:#e9e9ec;--muted:#9a9aa2;--muted2:#666;--rose:#f9a8c9;--c-tete:#f9a8c9;--c-gagne:#3d9e7a;--c-gagne-light:#6ee7b7;--c-depasse:#888880;}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{margin:0;background:var(--bg);color:var(--text);font-family:-apple-system,system-ui,"Segoe UI",sans-serif;font-size:14px;}
body{padding-bottom:64px;}
header{position:sticky;top:0;z-index:30;background:#0c0c0eF2;backdrop-filter:blur(8px);border-bottom:1px solid var(--line);padding:8px 10px;}
.htop{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;}
.logo{font-weight:800;letter-spacing:.04em;font-size:14px;}
#syncDot{font-size:13px;color:#555;}
.kpis{display:flex;gap:6px;overflow-x:auto;}
.kpi{background:var(--panel);border:1px solid var(--line);border-radius:9px;padding:6px 9px;min-width:70px;flex:none;}
.kpi.big{min-width:104px;}
.kpi-n{font-weight:800;font-size:15px;line-height:1.1;}
.kpi.big .kpi-n{font-size:19px;}
.kpi-l{font-size:8.5px;letter-spacing:.05em;color:var(--muted2);text-transform:uppercase;margin-top:2px;}
main{padding:10px;}
.pays-bar{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:12px;}
.pays-chip{display:inline-flex;align-items:center;gap:5px;padding:3px 4px 3px 9px;border:1px solid var(--line);border-radius:16px;font-size:11px;color:var(--muted);}
.pays-chip.active{border-color:var(--c-tete);color:var(--text);background:rgba(249,168,201,.1);}
.pays-chip.elim{opacity:.5;text-decoration:line-through;}
.pays-x{border:none;background:rgba(255,255,255,.07);color:var(--muted2);border-radius:50%;width:18px;height:18px;font-size:10px;padding:0;}
/* segments */
.seg-wrap{position:relative;padding-top:11px;}
.seg-row{display:flex;gap:3px;}
.seg{flex:1;height:10px;border-radius:3px;background:#2c2c2c;}
.seg-cursor{position:absolute;top:-2px;transform:translateX(-50%);font-size:10px;color:#fff;line-height:1;}
.dot{width:10px;height:10px;border-radius:50%;flex:none;}
/* ticket card */
.list{display:flex;flex-direction:column;gap:9px;}
.tcard{background:var(--panel);border:1px solid var(--line);border-radius:13px;padding:11px 13px;border-left:3px solid var(--c-tete);}
.tcard.dead{opacity:.5;border-left-color:#45453f;}
.tc-top{display:flex;align-items:center;gap:8px;}
.tc-nom{font-weight:800;font-size:15px;}
.tc-sys{font-size:11px;color:var(--muted2);}
.badge{margin-left:auto;font-size:9px;font-weight:700;letter-spacing:.06em;padding:3px 7px;border-radius:6px;}
.b-win{background:rgba(110,231,183,.15);color:var(--c-gagne-light);}
.b-live{background:rgba(249,168,201,.13);color:var(--c-tete);}
.b-close{background:rgba(249,168,201,.2);color:var(--c-tete);}
.b-dead{background:#26262a;color:#777;}
.tc-bot{display:flex;align-items:center;justify-content:space-between;margin-top:6px;}
.tc-frac{font-size:12px;color:var(--muted);}
.tc-gain{font-weight:800;color:var(--c-gagne-light);}
/* joueurs */
.plist{display:flex;flex-direction:column;gap:8px;}
.pcard{background:var(--panel);border:1px solid var(--line);border-top:2px solid transparent;border-bottom:2px solid transparent;border-radius:11px;padding:9px 11px;}
.pcard.fr-encours{border-top-color:var(--c-tete);border-bottom-color:var(--c-tete);}
.pcard.fr-elim{border-top-color:#555;border-bottom-color:#555;}
.pc-top{display:flex;flex-direction:column;gap:1px;margin-bottom:7px;}
.pc-name{font-weight:700;font-size:15px;}
.pc-meta{font-size:11px;color:var(--muted);}
.tbadge{font-size:9px;padding:1px 5px;border-radius:4px;}
.tbadge.buteur{background:rgba(167,139,250,.18);color:#c4b5fd;}
.tbadge.passeur{background:rgba(150,152,160,.16);color:#b9b9c2;}
.pc-btns{display:flex;gap:5px;}
.sbtn{flex:1;background:var(--panel2);border:1px solid var(--line);color:var(--muted);border-radius:7px;padding:8px 0;font-size:11px;font-weight:600;}
.sbtn.on-tete{background:var(--c-tete);color:#1a1a1a;border-color:var(--c-tete);}
.sbtn.on-depasse{background:var(--c-depasse);color:#1a1a1a;border-color:var(--c-depasse);}
.sbtn.on-attente{background:#3a3a3e;color:var(--text);border-color:#4a4a4e;}
.pc-neg{display:flex;align-items:center;gap:6px;margin-top:6px;font-size:11px;color:var(--muted);}
.mini{background:var(--panel2);border:1px solid var(--line);color:var(--muted);border-radius:6px;min-width:30px;padding:6px 8px;font-size:11px;font-weight:600;}
.mini.on-tete{background:var(--c-tete);color:#1a1a1a;}
.mini.on-depasse{background:var(--c-depasse);color:#1a1a1a;}
.mini.on-attente{background:#3a3a3e;color:var(--text);}
/* tab bar */
.tabbar{position:fixed;bottom:0;left:0;right:0;display:flex;background:#101012;border-top:1px solid var(--line);z-index:30;}
.tabbar button{flex:1;background:none;border:none;color:var(--muted2);font-size:12px;font-weight:600;padding:16px 0;}
.tabbar button.on{color:var(--c-tete);}
/* sheet */
.scrim{position:fixed;inset:0;background:rgba(0,0,0,.6);opacity:0;pointer-events:none;transition:opacity .2s;z-index:40;}
.scrim.on{opacity:1;pointer-events:auto;}
.sheet{position:fixed;left:0;right:0;bottom:0;max-height:90vh;overflow-y:auto;background:var(--panel);border-radius:18px 18px 0 0;border-top:1px solid var(--line);transform:translateY(100%);transition:transform .25s;z-index:50;-webkit-overflow-scrolling:touch;}
.sheet.open{transform:translateY(0);}
.sh-head{position:sticky;top:0;background:var(--panel);display:flex;align-items:center;gap:8px;padding:14px;border-bottom:1px solid var(--line);}
.sh-title{font-weight:800;font-size:16px;}
.sh-x{margin-left:auto;background:var(--panel2);border:1px solid var(--line);color:var(--muted);border-radius:8px;width:32px;height:32px;font-size:14px;}
.sh-body{padding:12px 14px 30px;}
.sh-kpis{display:flex;gap:6px;}
.sh-sec{font-size:10px;letter-spacing:.06em;text-transform:uppercase;color:var(--muted2);margin:16px 0 8px;}
.sh-sel{display:flex;align-items:center;gap:7px;flex-wrap:wrap;padding:7px 0;border-bottom:1px solid var(--line);}
.sh-name{font-weight:700;}
.sh-pays{font-size:11px;color:var(--muted);}
.sh-cote{font-size:11px;color:var(--muted2);}
.sh-btns{display:flex;gap:4px;width:100%;margin-top:5px;}
.sh-btns .mini{flex:1;}
.pal-row{display:flex;align-items:center;gap:8px;padding:5px 0;}
.pal-row.mort{opacity:.4;}.pal-row.next .pal-l{color:var(--c-tete);}
.pal-l{font-size:12px;width:34px;color:var(--muted);}
.pal-tk{flex:1;height:7px;background:#262626;border-radius:4px;overflow:hidden;}
.pal-f{height:100%;}
.pal-v{font-size:11px;min-width:54px;text-align:right;color:var(--muted);}
.ut-list{display:flex;flex-direction:column;}
.ut{display:flex;justify-content:space-between;gap:10px;padding:6px 0;border-bottom:1px solid #202022;font-size:12px;}
.ut-g{font-weight:700;white-space:nowrap;}
.reset{color:var(--muted2);margin-left:4px;}
.empty{color:var(--muted2);padding:8px 0;font-size:12px;}
/* option B : bouton + formulaire ticket */
.add-row{padding:8px 12px 0}
.add-tk-btn{background:var(--c-tete);color:#1a1a1a;border:none;border-radius:8px;padding:9px 14px;font-size:13px;font-weight:700;width:100%}
.form-body{padding:12px 14px 28px;overflow:auto;max-height:calc(85vh - 46px)}
.form-line{display:flex;gap:8px;margin-bottom:10px}
.form-line input{flex:1}
.form-x{font-size:13px;color:var(--muted);display:flex;align-items:center;gap:6px}
.form-sec{font-size:11px;letter-spacing:.06em;text-transform:uppercase;color:var(--muted);margin:8px 0 6px}
.form-sel{display:flex;gap:5px;align-items:center;margin-bottom:6px}
.form-body input,.form-body select{background:#161618;border:1px solid #303036;color:#e6e6e6;border-radius:7px;padding:9px 8px;font-size:14px;min-width:0}
.form-sel input:nth-child(1){flex:2}
.form-sel input:nth-child(2){flex:1}
.form-sel input[type=number]{width:56px;flex:none}
.form-sel #f_n0,.form-sel input[title=egalite]{width:42px}
.form-actions{display:flex;gap:8px;margin-top:14px}
.form-actions .mini{flex:1;padding:11px}
.form-actions .add-tk-btn{flex:2}
/* filtre texte joueurs */
.jfilter{width:100%;background:#161618;border:1px solid #303036;color:#e6e6e6;border-radius:9px;padding:10px 12px;font-size:14px;margin:8px 0;box-sizing:border-box}
.jfilter::placeholder{color:#6a6a72}

.tc-max{color:var(--c-gagne-light);font-size:11px;font-weight:700;margin-left:6px}

/* --- onglet Reseau (mobile) --- */
.mnet-bar{display:flex;align-items:center;gap:8px;padding:8px 10px;border-bottom:1px solid var(--line)}
.mnet-count{font-size:11px;color:var(--muted);margin-left:auto}
.nseg{display:inline-flex;border:1px solid var(--line);border-radius:8px;overflow:hidden}
.nseg button{background:transparent;color:var(--muted);border:none;padding:5px 9px;font-size:12px;font-weight:600}
.nseg button.on{background:#23232a;color:#fff}
.mnet-graph{position:relative;height:46vh;background:#0c0c0e;overflow:hidden;touch-action:none}
#mnetSvg{width:100%;height:100%;display:block}
.nedge{stroke:#d4d4dc;stroke-opacity:0}
.nedge.nlit{stroke-opacity:.55;stroke-width:1.6}
.nnode .ncirc{stroke:#0c0c0e;stroke-width:1.5}
.nnode text{font-size:10px;fill:#e6e6e6;opacity:.85;paint-order:stroke;stroke:#0c0c0e;stroke-width:3px}
.nnode.ntete .ncirc{stroke:var(--c-tete);stroke-width:2.5}
.nnode.nsel .ncirc{stroke:var(--c-gagne-light);stroke-width:3.5}
.nnode.nsel text,.nnode.nanchor text{opacity:1;font-weight:700;fill:#fff}
.nnode.ndim{opacity:.1}
.nnode.nsat{opacity:.42}
.nnode.nspotdim{opacity:.08}
.nnode.nspot{opacity:1}
.nnode.nspot text{opacity:1;font-weight:700;fill:#fff}
.mnet-list{padding:6px 9px}
.ntk{border:1px solid var(--line);border-radius:10px;padding:8px 10px;margin-bottom:6px;background:#161619}
.ntk.spoton{border-color:var(--c-gagne-light);background:#19211d}
.ntk-h{display:flex;align-items:center;gap:8px;font-weight:700}
.ntk-max{color:var(--c-gagne-light);font-size:11px;font-weight:700}
.ntk-sys{margin-left:auto;font-size:11px;color:var(--muted);font-weight:600}
.ntk-sels{margin-top:4px;font-size:11px;color:var(--muted);line-height:1.5}
.ntk-sels b{color:var(--c-gagne-light);font-weight:700}
.ntk-sels .pp{color:#cdb98a}
</style></head>
<body>
<header><div class="htop"><div class="logo">WC 2026</div><span id="syncDot">○</span></div><div class="kpis" id="kpis"></div></header>
<main><div id="view"></div></main>
<div class="tabbar"><button class="on" data-t="tickets" onclick="goTab('tickets')">Tickets</button><button data-t="reseau" onclick="goTab('reseau')">Réseau</button><button data-t="joueurs" onclick="goTab('joueurs')">Joueurs</button></div>
<div class="scrim" id="scrim" onclick="closeSheet()"></div><div class="sheet" id="sheet"></div>
<script>
/* WC2026 - moteur de calcul - ES5 pur, ASCII only (compatible Safari iOS et Chrome) */
/* Aucune dependance, aucun DOM. Fonctions pures: (source + etat) -> calculs. */
var WC = (function () {
  "use strict";

  function norm(s) {
    s = String(s == null ? "" : s).toLowerCase();
    s = s.normalize ? s.normalize("NFD").replace(/[\u0300-\u036f]/g, "") : s;
    s = s.replace(/-/g, " ").replace(/\s+/g, " ");
    return s.replace(/^\s+|\s+$/g, "");
  }
  function selKey(sel) { return norm(sel.joueur) + "|" + norm(sel.pays) + "|" + norm(sel.type); }
  function paysKey(sel) { return norm(sel.pays); }

  /* etat derive d'une selection a partir de l'etat dynamique */
  function selState(sel, players, pays) {
    var k = selKey(sel);
    var ps = players[k] || { status: "attente", n_egalite: 1 };
    var status = ps.status || "attente";
    var neg = ps.n_egalite || 1;
    var paysSt = (pays[paysKey(sel)] || { status: "en_course" }).status;
    /* figement: pays elimine ne peut plus etre attente -> force depasse */
    if (paysSt === "elimine" && status === "attente") status = "depasse";
    /* sortie definitive */
    var outcome;
    if (paysSt === "en_course") outcome = "potentielle";
    else if (status === "tete") outcome = "gagnee";
    else outcome = "perdue";
    /* couche provisoire: gele maintenant */
    var prov = (outcome === "gagnee" || (outcome === "potentielle" && status === "tete")) ? "gagnante" : "perdante";
    var cote = (sel.cote == null) ? null : sel.cote;
    var coteEff = (cote == null) ? null : Math.max(cote / neg, 1);
    return { key: k, status: status, neg: neg, pays: paysSt, outcome: outcome, prov: prov, cote: cote, coteEff: coteEff };
  }

  /* polynomes symetriques elementaires e[0..m] des valeurs vals */
  function esp(vals) {
    var e = [1], i, j;
    for (i = 0; i < vals.length; i++) { e[i + 1] = 0; for (j = i + 1; j >= 1; j--) { e[j] = e[j] + vals[i] * e[j - 1]; } }
    return e;
  }

  /* sous-ensembles de taille k des indices 0..n-1 (ES5, iteratif) */
  function kcombos(n, k) {
    var res = [], idx = [], i;
    if (k < 0 || k > n) return res;
    for (i = 0; i < k; i++) idx.push(i);
    while (true) {
      res.push(idx.slice());
      i = k - 1;
      while (i >= 0 && idx[i] === n - k + i) i--;
      if (i < 0) break;
      idx[i]++;
      for (var j = i + 1; j < k; j++) idx[j] = idx[j - 1] + 1;
    }
    return res;
  }

  /* calcule un ticket. expo (optionnel) = accumulateur d'exposition par joueur. */
  function computeTicket(tk, players, pays, mise, expo) {
    var parts = String(tk.systeme).split("/");
    var X = parseInt(parts[0], 10), N = parseInt(parts[1], 10);
    var sels = tk.selections, st = [], i, m;
    for (i = 0; i < sels.length; i++) st.push(selState(sels[i], players, pays));

    var G = 0, P = 0, D = 0, provG = 0;
    for (i = 0; i < st.length; i++) {
      if (st[i].outcome === "gagnee") G++;
      else if (st[i].outcome === "potentielle") P++;
      else D++;
      if (st[i].prov === "gagnante") provG++;
    }

    var paliers = [], gainAcquis = 0, gainPotentiel = 0, gainProjete = 0;
    for (var k = X; k <= N; k++) {
      var pal = { k: k, label: k + "/" + N, nCombos: 0, nDead: 0, nLive: 0, nFinal: 0, gainAcquis: 0, gainPotentiel: 0, gainProjete: 0 };
      var cmb = kcombos(st.length, k);
      for (var c = 0; c < cmb.length; c++) {
        var combo = cmb[c], hasPerdue = false, allGagnee = true, allProvGagn = true, coteProd = 1, valid = true;
        for (m = 0; m < combo.length; m++) {
          var s = st[combo[m]];
          if (s.coteEff == null) valid = false;
          if (s.outcome === "perdue") hasPerdue = true;
          if (s.outcome !== "gagnee") allGagnee = false;
          if (s.prov !== "gagnante") allProvGagn = false;
          coteProd *= (s.coteEff == null ? 1 : s.coteEff);
        }
        var g = coteProd * mise;
        pal.nCombos++;
        /* projete = gele maintenant: combo entierement compose de selections provisoirement gagnantes */
        if (allProvGagn) { pal.gainProjete += g; gainProjete += g; }
        var state;
        if (hasPerdue) { pal.nDead++; state = "dead"; }
        else if (allGagnee) { pal.nFinal++; pal.gainAcquis += g; gainAcquis += g; state = "finalized"; }
        else { pal.nLive++; pal.gainPotentiel += g; gainPotentiel += g; state = "live"; }
        /* exposition par joueur: combos non morts */
        if (expo && state !== "dead") {
          for (m = 0; m < combo.length; m++) {
            var key = st[combo[m]].key;
            var e = expo[key] || (expo[key] = { acquis: 0, potentiel: 0 });
            if (state === "finalized") e.acquis += g; else e.potentiel += g;
          }
        }
      }
      var aliveCount = G + P;
      pal.mort = (aliveCount < k);
      pal.manqueDef = Math.max(k - G, 0);   /* joueurs gagnants definitifs manquants */
      pal.manqueProv = Math.max(k - provG, 0); /* joueurs manquants si on gele maintenant */
      paliers.push(pal);
    }

    var statut = (G >= X) ? "gagne" : ((G + P < X) ? "perdu" : "en_cours");

    /* prochain plancher : gain si la prochaine selection la plus probable (plus petite cote) gagne */
    var winVals = [], q;
    for (q = 0; q < st.length; q++) { if (st[q].prov === "gagnante" && st[q].coteEff != null) winVals.push(st[q].coteEff); }
    var ee = esp(winVals), S = 0, jj;
    for (jj = X - 1; jj <= N - 1; jj++) { S += (ee[jj] || 0); }
    var nextI = -1, nextCote = Infinity, incr;
    for (q = 0; q < st.length; q++) {
      if (st[q].outcome === "potentielle" && st[q].prov === "perdante" && st[q].coteEff != null) {
        incr = st[q].coteEff * mise * S;
        if (expo) { var ek = st[q].key; var e2 = expo[ek] || (expo[ek] = { acquis: 0, potentiel: 0, plancher: 0 }); if (e2.plancher == null) e2.plancher = 0; e2.plancher += incr; }
        if (st[q].coteEff < nextCote) { nextCote = st[q].coteEff; nextI = q; }
      }
    }
    var gainProchain = gainProjete + (nextI >= 0 ? nextCote * mise * S : 0);
    var prochainJoueur = nextI >= 0 ? sels[nextI].joueur : null;

    return {
      id: tk.id, nom: tk.nom, X: X, N: N,
      G: G, P: P, D: D, provG: provG,
      statut: statut,                 /* definitif: en_cours | gagne | perdu */
      virtuel: (provG >= X),          /* provisoire: vrai si gele maintenant -> palier atteint */
      gainAcquis: gainAcquis, gainPotentiel: gainPotentiel, gainProjete: gainProjete,
      maxEnCours: gainAcquis + gainPotentiel,
      gainProchain: gainProchain, prochainJoueur: prochainJoueur,
      paliers: paliers, selStates: st
    };
  }

  function computeAll(source, players, pays) {
    var mise = (source.meta && source.meta.mise != null) ? source.meta.mise : 0.10;
    var expo = {}, tickets = [], i;
    var totAcq = 0, totPot = 0, totProj = 0, totProch = 0, totMax = 0, nGagne = 0, nPerdu = 0, nEnCours = 0, nVirtuel = 0;
    for (i = 0; i < source.tickets.length; i++) {
      var r = computeTicket(source.tickets[i], players, pays, mise, expo);
      tickets.push(r);
      totAcq += r.gainAcquis; totPot += r.gainPotentiel; totProj += r.gainProjete; totProch += r.gainProchain; totMax += r.maxEnCours;
      if (r.statut === "gagne") nGagne++; else if (r.statut === "perdu") nPerdu++; else nEnCours++;
      if (r.virtuel) nVirtuel++;
    }
    return {
      tickets: tickets, exposition: expo,
      totaux: { gainAcquis: totAcq, gainPotentiel: totPot, gainProjete: totProj, gainProchain: totProch, maxEnCours: totMax,
                nGagne: nGagne, nPerdu: nPerdu, nEnCours: nEnCours, nVirtuel: nVirtuel }
    };
  }

  return { norm: norm, selKey: selKey, kcombos: kcombos, computeTicket: computeTicket, computeAll: computeAll };
})();
if (typeof module !== "undefined") module.exports = WC;

var TF = { pays:{}, joueurs:{}, type:"all" };
var MNET = { built:false, sig:"", pos:{}, nodeEls:{}, edgeEls:[], nodes:[], adj:{}, tx:0, ty:0, sc:1, spotTid:null };

function tkPasseTF(tk){

  return true;
}
function mnetVisType(n){ return TF.type==="all"||n.type===TF.type; }

function mnetBuild(){
  var nodes={}, adj={}, edges=[], eseen={}, i, j;
  for(i=0;i<T.length;i++){
    var ids=[], sels=T[i].selections, s, k;
    for(j=0;j<sels.length;j++){ s=sels[j]; k=eKey(s.joueur,s.pays,s.type); if(!nodes[k]) nodes[k]={id:k,name:s.joueur,pays:s.pays,type:s.type,freq:0}; nodes[k].freq++; if(ids.indexOf(k)<0)ids.push(k); }
    var a,b; for(a=0;a<ids.length;a++)for(b=a+1;b<ids.length;b++){ var pr=ids[a]<ids[b]?[ids[a],ids[b]]:[ids[b],ids[a]]; eseen[pr[0]+"~"+pr[1]]=pr; }
  }
  for(k in eseen) edges.push(eseen[k]);
  for(k in nodes) adj[k]=[];
  for(i=0;i<edges.length;i++){ adj[edges[i][0]].push(edges[i][1]); adj[edges[i][1]].push(edges[i][0]); }
  return {nodes:nodes,edges:edges,adj:adj};
}
function mnetLayout(ids, edges){
  var W=1000,H=1000,k=Math.sqrt((W*H)/Math.max(1,ids.length)),pos={},rnd=1,i,it,a,b;
  function rr(){ rnd=(rnd*9301+49297)%233280; return rnd/233280; }
  for(i=0;i<ids.length;i++) pos[ids[i]]=[rr()*W,rr()*H];
  for(it=0; it<240; it++){
    var disp={}; for(i=0;i<ids.length;i++) disp[ids[i]]=[0,0];
    for(a=0;a<ids.length;a++)for(b=a+1;b<ids.length;b++){ var ia=ids[a],ib=ids[b],dx=pos[ia][0]-pos[ib][0],dy=pos[ia][1]-pos[ib][1],d=Math.sqrt(dx*dx+dy*dy)+0.01,f=k*k/d,ux=dx/d,uy=dy/d; disp[ia][0]+=ux*f;disp[ia][1]+=uy*f;disp[ib][0]-=ux*f;disp[ib][1]-=uy*f; }
    for(i=0;i<edges.length;i++){ var e=edges[i],dx2=pos[e[0]][0]-pos[e[1]][0],dy2=pos[e[0]][1]-pos[e[1]][1],d2=Math.sqrt(dx2*dx2+dy2*dy2)+0.01,f2=d2*d2/k*0.5,vx=dx2/d2,vy=dy2/d2; disp[e[0]][0]-=vx*f2;disp[e[0]][1]-=vy*f2;disp[e[1]][0]+=vx*f2;disp[e[1]][1]+=vy*f2; }
    var t=Math.max(2,38*(1-it/240));
    for(i=0;i<ids.length;i++){ var id=ids[i],ddx=disp[id][0],ddy=disp[id][1],dd=Math.sqrt(ddx*ddx+ddy*ddy)+1e-9,mm=Math.min(dd,t); pos[id][0]=Math.min(W-20,Math.max(20,pos[id][0]+ddx/dd*mm)); pos[id][1]=Math.min(H-20,Math.max(20,pos[id][1]+ddy/dd*mm)); }
  }
  return pos;
}
function mnodeBy(k){ var i; for(i=0;i<MNET.nodes.length;i++) if(MNET.nodes[i].id===k) return MNET.nodes[i]; return null; }
function mnetSpot(ids){
  var s={},i,n; for(i=0;i<ids.length;i++){ n=mnodeBy(ids[i]); if(n&&mnetVisType(n)) s[ids[i]]=1; }
  var k; for(k in MNET.nodeEls){ var el2=MNET.nodeEls[k]; el2.classList.remove("nspot","nspotdim"); el2.classList.add(s[k]?"nspot":"nspotdim"); }
  for(i=0;i<MNET.edgeEls.length;i++){ var l=MNET.edgeEls[i]; if(s[l._a]&&s[l._b]) l.classList.add("nlit"); else l.classList.remove("nlit"); }
}
function mnetClearSpot(){ var k,i; for(k in MNET.nodeEls) MNET.nodeEls[k].classList.remove("nspot","nspotdim"); for(i=0;i<MNET.edgeEls.length;i++) MNET.edgeEls[i].classList.remove("nlit"); }

function renderReseauM(R){
  var sig=""; var i; for(i=0;i<T.length;i++) sig+=T[i].id+","; 
  var needBuild = !document.getElementById("mnetSvg") || MNET.sig!==sig;
  if(needBuild){
    MNET.sig=sig; MNET.tx=0;MNET.ty=0;MNET.sc=1; MNET.spotTid=null;
    var D=mnetBuild(); MNET.adj=D.adj; MNET.nodes=[]; var k; for(k in D.nodes) MNET.nodes.push(D.nodes[k]);
    var ids=[]; for(i=0;i<MNET.nodes.length;i++) ids.push(MNET.nodes[i].id);
    MNET.pos=mnetLayout(ids,D.edges);
    var html="<div class='mnet-bar'><div class='nseg' id='mnetSeg'></div><button class='add-tk-btn' onclick=\"tfClear()\">Reset</button><span class='mnet-count' id='mnetCount'></span></div>"+
      "<div class='mnet-graph'><svg id='mnetSvg' viewBox='0 0 1000 1000' preserveAspectRatio='xMidYMid meet'><g id='mnetView'><g id='mnetEdges'></g><g id='mnetNodes'></g></g></svg></div>"+
      "<div class='mnet-list' id='mnetList'></div>";
    el("view").innerHTML=html;
    var NS="http://www.w3.org/2000/svg";
    var gE=document.getElementById("mnetEdges"), gN=document.getElementById("mnetNodes");
    MNET.edgeEls=[]; MNET.nodeEls={};
    for(i=0;i<D.edges.length;i++){ var e=D.edges[i],l=document.createElementNS(NS,"line");
      l.setAttribute("x1",MNET.pos[e[0]][0]);l.setAttribute("y1",MNET.pos[e[0]][1]);l.setAttribute("x2",MNET.pos[e[1]][0]);l.setAttribute("y2",MNET.pos[e[1]][1]);
      l.setAttribute("class","nedge"); l._a=e[0]; l._b=e[1]; gE.appendChild(l); MNET.edgeEls.push(l); }
    for(i=0;i<MNET.nodes.length;i++){ (function(n){
      var g=document.createElementNS(NS,"g"); g.setAttribute("class","nnode"); g.setAttribute("transform","translate("+MNET.pos[n.id][0]+","+MNET.pos[n.id][1]+")");
      var r=4+Math.min(n.freq,14)*1.1;
      var c=document.createElementNS(NS,"circle"); c.setAttribute("r",r); c.setAttribute("fill",n.type==="buteur"?"#7aa2f7":"#e0af68"); c.setAttribute("class","ncirc");
      var tx=document.createElementNS(NS,"text"); tx.setAttribute("x",r+2); tx.setAttribute("y",3); tx.textContent=cap(n.name)+(n.type==="passeur"?" (P)":"");
      g.appendChild(c); g.appendChild(tx);
      g.addEventListener("click",function(ev){ ev.stopPropagation(); if(MNET._moved)return; tfToggleJoueur(n.id); });
      gN.appendChild(g); MNET.nodeEls[n.id]=g;
    })(MNET.nodes[i]); }
    mnetTouch();
  }
  document.getElementById("mnetSeg").innerHTML =
    "<button class='"+(TF.type==="all"?"on":"")+"' onclick=\"tfSetType('all')\">Tous</button>"+
    "<button class='"+(TF.type==="buteur"?"on":"")+"' onclick=\"tfSetType('buteur')\">Buteurs</button>"+
    "<button class='"+(TF.type==="passeur"?"on":"")+"' onclick=\"tfSetType('passeur')\">Passeurs</button>";
  mnetUpdate();
}
function mnetUpdate(){
  if(!document.getElementById("mnetSvg")) return;
  var matched=[], i; for(i=0;i<T.length;i++) if(tkPasseTF(T[i])) matched.push(T[i]);
  var keep={}, j; for(i=0;i<matched.length;i++) for(j=0;j<matched[i].selections.length;j++){ var s=matched[i].selections[j]; keep[eKey(s.joueur,s.pays,s.type)]=1; }
  var anyF=tfCount()>0;
  for(i=0;i<MNET.nodes.length;i++){ var n=MNET.nodes[i], g=MNET.nodeEls[n.id]; if(!g)continue;
    g.style.display=mnetVisType(n)?"":"none";
    if(statusOf(n.name,n.pays,n.type)==="tete") g.classList.add("ntete"); else g.classList.remove("ntete");
    if(TF.joueurs[n.id]) g.classList.add("nsel"); else g.classList.remove("nsel");
    g.classList.remove("ndim","nsat","nanchor","nspot","nspotdim");
    if(anyF){ if(!keep[n.id]) g.classList.add("ndim"); else if(TF.joueurs[n.id]||TF.pays[pKeyN(n.pays)]) g.classList.add("nanchor"); else g.classList.add("nsat"); }
  }
  for(i=0;i<MNET.edgeEls.length;i++) MNET.edgeEls[i].classList.remove("nlit");
  document.getElementById("mnetCount").textContent=matched.length+" / "+T.length+" tickets";
  var h="", r;
  for(i=0;i<matched.length;i++){ var tk=matched[i]; r=WC.computeTicket(tk,P,PAYS,MISE,null);
    var on=MNET.spotTid===tk.id;
    var sels=""; for(j=0;j<tk.selections.length;j++){ var ss=tk.selections[j],sel=TF.joueurs[eKey(ss.joueur,ss.pays,ss.type)]; var lab=cap(ss.joueur)+(ss.type==="passeur"?" (P)":""); sels+=(j?" + ":"")+(sel?"<b>"+lab+"</b>":"<span class='pp'>"+lab+"</span>"); }
    h+="<div class='ntk"+(on?" spoton":"")+"' onclick=\"mnetTapTicket('"+tk.id+"')\"><div class='ntk-h'><span>"+tk.nom+"</span><span class='ntk-max'>\u2191 "+fmt(r.maxEnCours)+"</span><span class='ntk-sys'>"+tk.systeme+"</span></div><div class='ntk-sels'>"+sels+"</div></div>";
  }
  el("mnetList").innerHTML=h||"<div class='empty'>Aucun ticket</div>";
}
function mnetTapTicket(id){
  if(MNET.spotTid===id){ MNET.spotTid=null; mnetClearSpot(); }
  else { MNET.spotTid=id; var tk=null,i; for(i=0;i<T.length;i++) if(T[i].id===id) tk=T[i];
    if(tk){ var ids=[],j; for(j=0;j<tk.selections.length;j++){ var s=tk.selections[j]; ids.push(eKey(s.joueur,s.pays,s.type)); } mnetSpot(ids); } }
  mnetUpdate();
}
function mnetTouch(){
  var svg=document.getElementById("mnetSvg"), view=document.getElementById("mnetView");
  function apply(){ view.setAttribute("transform","translate("+MNET.tx+","+MNET.ty+") scale("+MNET.sc+")"); }
  apply();
  var lastX=0,lastY=0,pinchD=0,mode=0;
  svg.addEventListener("touchstart",function(e){ MNET._moved=false;
    if(e.touches.length===1){ mode=1; lastX=e.touches[0].clientX; lastY=e.touches[0].clientY; }
    else if(e.touches.length===2){ mode=2; var dx=e.touches[0].clientX-e.touches[1].clientX,dy=e.touches[0].clientY-e.touches[1].clientY; pinchD=Math.sqrt(dx*dx+dy*dy); }
  },{passive:true});
  svg.addEventListener("touchmove",function(e){
    if(mode===1&&e.touches.length===1){ var nx=e.touches[0].clientX,ny=e.touches[0].clientY,ddx=nx-lastX,ddy=ny-lastY; if(Math.abs(ddx)+Math.abs(ddy)>4)MNET._moved=true; MNET.tx+=ddx;MNET.ty+=ddy;lastX=nx;lastY=ny;apply(); e.preventDefault(); }
    else if(mode===2&&e.touches.length===2){ MNET._moved=true; var dx=e.touches[0].clientX-e.touches[1].clientX,dy=e.touches[0].clientY-e.touches[1].clientY,d=Math.sqrt(dx*dx+dy*dy); if(pinchD>0){ var f=d/pinchD,ns=Math.min(6,Math.max(0.3,MNET.sc*f)); var rc=svg.getBoundingClientRect(),cx=(e.touches[0].clientX+e.touches[1].clientX)/2-rc.left,cy=(e.touches[0].clientY+e.touches[1].clientY)/2-rc.top,kk=ns/MNET.sc; MNET.tx=cx-(cx-MNET.tx)*kk; MNET.ty=cy-(cy-MNET.ty)*kk; MNET.sc=ns; apply(); } pinchD=d; e.preventDefault(); }
  },{passive:false});
  svg.addEventListener("touchend",function(e){ if(e.touches.length===0) mode=0; },{passive:true});
}

</script>
</body></html>
