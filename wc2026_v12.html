<!DOCTYPE html>
<html lang="fr"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WC 2026</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0c0c0c;--s1:#111;--s2:#141414;--s3:#181818;
  --border:#1e1e1e;--border2:#222;
  --text:#f0f0f0;--muted:#666;--muted2:#999;
  /* Statuts — dégradé de roses pour positif, gris pour neutre/négatif */
  --c-gagne:#7dd3b0;--c-gagne-bg:#0a1a13;--c-gagne-border:#1a4033;
  --c-tete:#f0a8c0;--c-tete-bg:#160a0f;--c-tete-border:#2e1220;
  --c-attente:#f0f0f0;--c-attente-bg:#111;--c-attente-border:#222;
  --c-depasse:#888880;--c-depasse-bg:#111;--c-depasse-border:#222;
  --c-mort:#444;--c-mort-bg:#0e0e0e;--c-mort-border:#1a1a1a;
  /* Alias legacy */
  --rose:#f0a8c0;--rose-dim:#d4789a;--rose-bg:#160a0f;--rose-mid:#2e1220;
  --green:#6ee7b7;--green-bg:#0a1f17;
  --amber:#888;--amber-bg:#111;--amber-mid:#222;
  --red:#444;--red-bg:#0e0e0e;
  --blue:#f0a8c0;--blue-bg:#160a0f;
}
html{font-size:13px}
body{background:var(--bg);color:var(--text);font-family:'Inter',system-ui,sans-serif;font-weight:400;min-height:100vh;line-height:1.4}

/* ── HEADER ── */
header{position:sticky;top:0;z-index:50;background:var(--bg);border-bottom:1px solid var(--border);padding:0 24px;display:flex;align-items:center;height:48px;gap:24px}
.logo{font-size:11px;font-weight:600;letter-spacing:.18em;text-transform:uppercase;color:var(--text);flex-shrink:0}
.h-stats{display:flex;gap:20px;margin-left:auto;flex-wrap:wrap}
.h-stat{display:flex;align-items:baseline;gap:4px}
.h-stat-n{font-size:15px;font-weight:600;color:var(--rose)}
.h-stat-l{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.1em}

/* ── NAV ── */
nav{background:var(--bg);border-bottom:1px solid var(--border);padding:0 24px;display:flex;align-items:center;gap:4px}
nav button{background:none;border:none;border-bottom:1px solid transparent;color:var(--muted);font:10px/1 'Inter',sans-serif;font-weight:500;letter-spacing:.12em;text-transform:uppercase;padding:12px 12px;cursor:pointer;transition:color .12s,border-color .12s;margin-bottom:-1px}
nav button:hover{color:var(--text)}
nav button.active{color:var(--text);border-bottom-color:var(--text)}
.nav-sep{flex:1}
.expand-all-btn{font-size:9px;font-weight:500;letter-spacing:.08em;text-transform:uppercase;background:var(--s2);border:1px solid var(--border2);color:var(--muted);padding:4px 10px;border-radius:6px;cursor:pointer;transition:all .1s}
.expand-all-btn:hover{color:var(--text);border-color:var(--muted)}

/* ── MAIN ── */
main{padding:20px 24px}
.tab{display:none}.tab.active{display:block}
.label{font-size:10px;font-weight:500;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid var(--border)}

/* ── KPI ── */
.kpi-row{display:flex;gap:0;margin-bottom:20px;border-bottom:1px solid var(--border2);border-top:1px solid var(--border2)}
.kpi{flex:1;background:transparent;padding:12px 14px;border-right:1px solid var(--border2)}
.kpi-n{font-size:22px;font-weight:300;line-height:1}
.kpi-l{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.1em;margin-top:4px}
.kpi-sub{font-size:10px;color:var(--muted2);margin-top:2px}

/* ── GAINS ROW ── */
.gains-row{display:flex;gap:0;margin-bottom:20px;border-bottom:1px solid var(--border2);border-top:1px solid var(--border2)}
.gain-kpi{flex:1;background:transparent;padding:12px 14px;border-right:1px solid var(--border2)}
.gain-n{font-size:18px;font-weight:500;line-height:1}
.gain-l{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.1em;margin-top:4px}

/* ── TETE STRIP ── */
.tete-strip{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:20px}
.tete-pill{background:transparent;border:none;border-bottom:1px solid var(--border2);padding:7px 4px}
.tete-pill-name{font-size:13px;font-weight:500;color:var(--rose)}
.tete-pill-sub{font-size:10px;color:var(--muted2);margin-top:2px}
.gagnant-pill{background:var(--green-bg);border:1px solid #1a5040}
.gagnant-pill .tete-pill-name{color:var(--green)}
.pill-cote{color:var(--amber);font-size:10px;font-weight:600}

/* ── ALERT ── */
.alert{border-left:2px solid var(--border2);background:transparent;padding:8px 12px;margin-bottom:2px;font-size:12px;color:var(--muted2);border-bottom:1px solid var(--border)}
.alert.win{border-left-color:var(--green);background:var(--green-bg)}
.alert.close{border-left-color:var(--rose);background:var(--rose-bg)}
.alert.warn{border-left-color:var(--red);background:var(--red-bg)}
.alert strong{color:var(--text);font-weight:500}
.alert .hi{color:var(--rose);font-weight:600}
.alert .ok{color:var(--green);font-weight:600}
.alert .gain-tag{color:var(--amber);font-weight:600}

/* ── FILTERS ── */
.filters{display:flex;gap:7px;margin-bottom:14px;flex-wrap:wrap}
.filters input,.filters select{background:var(--s1);border:1px solid var(--border2);color:var(--text);font:12px 'Inter',sans-serif;padding:5px 9px;border-radius:3px;outline:none;transition:border-color .1s}
.filters input{width:190px}
.filters input::placeholder{color:var(--muted)}
.filters input:focus,.filters select:focus{border-color:var(--rose-dim)}
.filters select option{background:#111}

/* ── JOUEURS ── */
.pgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:5px;margin-bottom:20px}
.pcard{background:transparent;border:none;border-bottom:1px solid var(--border2);padding:9px 4px;transition:opacity .1s}
.pcard.tete   {border-bottom-color:var(--c-tete)}
.pcard.gagnant{border-bottom-color:var(--c-gagne);background:rgba(201,96,126,0.05)}
.pcard.depasse{border-bottom-color:var(--c-depasse)}
.pcard.perdant{border-bottom-color:var(--c-mort);opacity:.5}
.pcard-top{display:flex;align-items:flex-start;justify-content:space-between;gap:6px}
.pcard-name{font-size:13px;font-weight:500;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pcard.tete    .pcard-name{color:var(--c-tete)}
.pcard.gagnant .pcard-name{color:var(--c-gagne);font-weight:700}
.pcard.depasse .pcard-name{color:var(--c-depasse)}
.pcard.perdant .pcard-name{color:var(--c-mort)}
.pcard-count{font-size:11px;color:var(--muted);flex-shrink:0}
.pcard-count.hi{color:var(--rose-dim)}
.pcard-meta{font-size:10px;color:var(--muted);margin-top:3px;display:flex;gap:5px;align-items:center;flex-wrap:wrap}
.cote-badge{font-size:10px;color:var(--muted2);padding:0 2px}
.tbadge{font-size:9px;letter-spacing:.06em;text-transform:uppercase;padding:0 4px;border-radius:6px;font-weight:500}
.tbadge.buteur{background:#111b2e;color:var(--blue)}
.tbadge.passeur{background:#0d2018;color:var(--green)}
.pcard-btns{display:flex;gap:2px;margin-top:7px;flex-wrap:wrap}
.sbtn{flex:1;min-width:0;background:var(--s2);border:1px solid var(--border2);color:var(--muted);font:9px 'Inter',sans-serif;font-weight:500;letter-spacing:.06em;text-transform:uppercase;padding:4px 2px;border-radius:6px;cursor:pointer;transition:all .1s;white-space:nowrap}
.sbtn:hover{color:var(--text);border-color:var(--muted)}
.sbtn.on-attente{background:transparent;color:var(--c-attente);border-color:var(--border2)}
.sbtn.on-tete   {background:var(--c-tete-bg);color:var(--c-tete);border-color:var(--c-tete-border)}
.sbtn.on-gagnant{background:var(--c-gagne-bg);color:var(--c-gagne);border-color:var(--c-gagne-border)}
.sbtn.on-depasse{background:var(--c-depasse-bg);color:var(--c-depasse);border-color:var(--c-depasse-border)}
.sbtn.on-perdant{background:var(--red-bg);color:var(--red);border-color:#6b2a1a}

/* ── TICKETS GRID ── */
.tgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(310px,1fr));gap:7px}

/* ── TCARD ── */
.tcard{background:transparent;border:none;border-bottom:1px solid var(--border2);overflow:hidden;margin-bottom:4px}
.tcard.has-win{border-left:2px solid var(--c-gagne)}
.tcard.has-tete{border-left:2px solid var(--c-tete)}
.tcard.is-dead{opacity:.4;border-left:2px solid var(--c-mort)}
.tcard.is-dead .tcard-nom{text-decoration:line-through;color:var(--c-mort)}
.tcard.has-tete{border-top:1px solid var(--rose-mid)}
.tcard-head{display:flex;align-items:center;gap:7px;padding:8px 4px;background:transparent;border-bottom:1px solid var(--border);cursor:pointer;user-select:none}
.tcard-nom{font-size:13px;font-weight:500;color:var(--text)}
.tcard-sys{font-size:10px;font-weight:500;letter-spacing:.06em;color:var(--muted2);background:transparent;border:1px solid var(--border2);padding:1px 6px;border-radius:4px}
.tcard-prog{display:flex;align-items:center;gap:5px}
.pbar-wrap{width:42px;height:2px;background:var(--border2);border-radius:1px;overflow:hidden}
.pbar{height:100%;border-radius:1px;transition:width .3s}
.tcard-frac{font-size:11px;font-weight:600;color:var(--muted);min-width:24px;text-align:right}
.tcard-gain-head{font-size:10px;font-weight:600;color:var(--amber);margin-left:auto;white-space:nowrap}
.tcard-expand-icon{font-size:9px;color:var(--muted);flex-shrink:0;margin-left:4px}

.tcard-body{padding:4px 0}
.sel{display:flex;align-items:center;gap:6px;padding:2px 3px;border-radius:2px}
.sel.tete   {background:transparent}
.sel.gagnant{background:var(--s2)}
.sel.depasse{opacity:.5}
.sel.perdant{opacity:.3}
.sel-dot{width:5px;height:5px;border-radius:50%;flex-shrink:0}
.sel-dot.attente{background:#2a2a2a}
.sel-dot.tete   {background:var(--rose)}
.sel-dot.gagnant {background:var(--c-gagne)}
.sel-dot.depasse{background:var(--amber)}
.sel-dot.perdant{background:var(--red)}
.sel-name{font-size:12px;flex:1;color:var(--c-attente)}
.sel.tete    .sel-name{color:var(--c-tete);font-weight:500}
.sel.gagnant .sel-name{color:var(--c-gagne);font-weight:600}
.sel.gagnant .sel-name{color:var(--c-gagne);font-weight:500}
.sel-pays{font-size:10px;color:var(--muted2)}
.sel-t{font-size:9px;font-weight:600;color:var(--muted);text-transform:uppercase}
.sel-cote{font-size:10px;color:var(--muted2);padding:0 2px;flex-shrink:0}

/* ── PROBA STRIP ── */
.proba-strip{padding:5px 4px 6px;border-top:1px solid var(--border)}
.proba-label{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.07em;margin-bottom:5px}
.proba-bars{display:flex;gap:3px;align-items:flex-end;height:28px}
.pb-col{display:flex;flex-direction:column;align-items:center;gap:1px;flex:1}
.pb-bar{width:100%;border-radius:1px 1px 0 0;transition:height .3s}
.pb-lbl{font-size:8px;color:var(--muted);white-space:nowrap}
.pb-pct{font-size:8px;color:var(--muted2)}

/* ── TCARD FOOT ── */
.tcard-foot{display:flex;align-items:center;padding:5px 0;border-top:1px solid var(--border);gap:7px}
.tcard-info{font-size:10px;color:var(--muted);flex:1}
.tcard-badge{font-size:9px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;padding:2px 6px;border-radius:6px;border:1px solid transparent}
.tcard-badge.win  {background:var(--green-bg);color:var(--green);border-color:#354d61}
.tcard-badge.close{background:var(--c-tete-bg);color:var(--c-tete);border-color:var(--c-tete-border)}
.tcard-badge.idle {background:var(--s2);color:var(--muted);border-color:var(--border2)}
.tcard-unitaires{font-size:9px;color:var(--muted2)}
.tcard-mise{font-size:9px;color:var(--muted);margin-left:auto}
.tcard-gain-foot{font-size:10px;font-weight:600;color:var(--amber)}

/* ── DEPLOYED ── */
.deploy-toggle{display:flex;align-items:center;gap:6px;padding:5px 0;border-top:1px solid var(--border);cursor:pointer;background:transparent}
.deploy-toggle:hover .deploy-label{color:var(--text)}
.deploy-icon{font-size:9px;color:var(--muted)}
.deploy-label{font-size:9px;color:var(--muted);letter-spacing:.04em}
.deploy-label span{color:var(--muted2)}
.deploy-gain{font-size:9px;font-weight:500;color:var(--muted2);margin-left:auto}

.deployed-section{border-top:1px solid var(--border);padding-left:4px}
.deploy-level{padding:6px 11px}
.deploy-level-title{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.07em;margin-bottom:4px;display:flex;align-items:center;gap:6px}
.deploy-level-gain{font-size:9px;font-weight:600;color:var(--amber)}

.ut-list{display:flex;flex-direction:column;gap:2px}
.ut-row{display:flex;align-items:center;justify-content:space-between;padding:4px 0;border:none;border-bottom:1px solid var(--border);background:transparent;font-size:10px;gap:8px}
/* GAGNÉ — blanc */
.ut-row.u-finalized{background:rgba(110,231,183,.05);border-left:2px solid var(--green)}
.ut-row.u-finalized .ut-names{color:var(--green);font-weight:600}
.ut-row.u-finalized .ut-gain{color:var(--green);font-weight:700}
.ut-row.u-live{}
.ut-row.u-live .ut-names{color:var(--rose);font-weight:500}
.ut-row.u-live .ut-gain{color:var(--rose);font-weight:500}
/* PROCHE — rose */



/* VIVANT — gris clair, gain en gris moyen */
.ut-row.u-live{}
.ut-row.u-live .ut-names{color:var(--muted2)}
.ut-row.u-live .ut-gain{color:var(--muted2);font-weight:500}
/* MORT — orange, texte barré */
.ut-row.u-dead{opacity:.5}
.ut-row.u-dead .ut-names{text-decoration:line-through}
.ut-row.u-dead .ut-gain{color:var(--c-mort)}
/* DEFAULT */
.ut-names{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.ut-gain{color:var(--muted);font-size:10px;font-weight:500;flex-shrink:0;min-width:44px;text-align:right}
/* ── TOOLTIP ── */
.ut[data-tip]{cursor:default}
.ut[data-tip]:hover::after{content:attr(data-tip);position:absolute;bottom:calc(100% + 4px);left:50%;transform:translateX(-50%);background:#111;border:1px solid var(--border2);color:var(--text);font-size:9px;padding:4px 7px;border-radius:3px;white-space:nowrap;z-index:100;pointer-events:none}

/* ── LEGEND ── */
.legend{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:14px}
.leg{display:flex;align-items:center;gap:4px;font-size:10px;color:var(--muted)}
.leg-dot{width:6px;height:6px;border-radius:50%}
.empty{color:var(--muted);padding:24px;text-align:center;font-size:12px}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}

/* ── MINI STATUT BOUTONS (inline dans tickets) ── */
.sel-actions{display:flex;gap:2px;margin-left:auto;opacity:0;transition:opacity .15s}
.sel:hover .sel-actions{opacity:1}
.mini-sbtn{background:none;border:1px solid var(--border2);color:var(--muted);font-size:9px;font-weight:600;padding:1px 4px;border-radius:3px;cursor:pointer;transition:all .1s;min-width:16px;text-align:center}
.mini-sbtn:hover{border-color:var(--muted2);color:var(--text)}
.mini-sbtn.on-attente{color:var(--c-attente);border-color:var(--border2)}
.mini-sbtn.on-tete   {color:var(--c-tete);border-color:var(--c-tete-border);background:var(--c-tete-bg)}
.mini-sbtn.on-gagnant{color:var(--c-gagne);border-color:var(--c-gagne-border);background:var(--c-gagne-bg)}
.mini-sbtn.on-depasse{color:var(--c-depasse);border-color:var(--c-depasse-border);background:var(--c-depasse-bg)}
.mini-sbtn.on-perdant{color:var(--c-mort);border-color:var(--c-mort-border);background:var(--c-mort-bg)}

/* ── Navigation & interactivité ── */
.tete-pill:hover{filter:brightness(1.15);transition:filter .15s}
.alert[onclick]{transition:opacity .1s}
.alert[onclick]:hover{opacity:.85}
.leg:hover span{color:var(--text)!important}
.kpi[onclick]{cursor:pointer}
.kpi[onclick]:hover{background:var(--s2)}
/* Distinction renforcée gagnant dans les cards joueurs */
.pcard.gagnant::after{content:'✓';position:absolute;right:8px;top:9px;font-size:10px;color:var(--c-gagne);font-weight:700}
.pcard{position:relative}
/* ── Analyse interactive (donut + barres) ── */
.charts-wrap{display:flex;gap:12px;flex-wrap:wrap;align-items:stretch}
.chart-card{background:var(--s1);border:1px solid var(--border);border-radius:10px;padding:14px 16px;flex:1;min-width:270px}
.chart-title{font-size:10px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:var(--muted2);margin-bottom:12px;display:flex;align-items:center;justify-content:space-between;gap:8px}
.chart-hint{font-weight:400;letter-spacing:0;text-transform:none;font-size:10px;color:var(--muted2);opacity:.7}
.chart-flex{display:flex;gap:16px;align-items:center}
.chart-legend{display:flex;flex-direction:column;gap:4px;flex:1;min-width:0}
.cleg{display:flex;align-items:center;gap:8px;font-size:12px;cursor:pointer;color:#888;padding:4px 8px;border-radius:6px;transition:all .15s;user-select:none}
.cleg:hover{background:rgba(255,255,255,.04)}
.cleg.on{color:var(--text);background:rgba(255,255,255,.07)}
.cleg.dim{opacity:.35}
.cleg-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.cleg-n{margin-left:auto;font-size:11px;color:var(--muted2);font-variant-numeric:tabular-nums}
.cleg.on .cleg-n{color:var(--text)}
.bar-row{display:flex;align-items:center;gap:10px;margin:9px 0}
.bar-lbl{font-size:9.5px;text-transform:uppercase;letter-spacing:.08em;color:var(--muted2);width:62px;flex-shrink:0}
.bar-track{flex:1;height:13px;background:rgba(255,255,255,.05);border-radius:4px;overflow:hidden}
.bar-fill{height:100%;border-radius:4px;transition:width .5s cubic-bezier(.2,.8,.2,1)}
.bar-val{font-size:12px;width:62px;text-align:right;flex-shrink:0;font-variant-numeric:tabular-nums}
.chart-reset{font-size:10px;color:#888;cursor:pointer;border:1px solid var(--border);border-radius:99px;padding:3px 10px;transition:all .15s;user-select:none;display:inline-flex;align-items:center;gap:4px}
.chart-reset:hover{color:var(--text);border-color:var(--muted2)}
/* ── Filtre drapeaux ── */
.flag-row{display:flex;gap:9px;overflow-x:auto;align-items:flex-start;scrollbar-width:none}
.flag-row::-webkit-scrollbar{display:none}
.flag-chip{display:flex;flex-direction:column;align-items:center;gap:2px;cursor:pointer;flex-shrink:0;opacity:.45;transition:opacity .2s,transform .12s;user-select:none;padding:2px 1px;-webkit-tap-highlight-color:transparent}
.flag-chip:hover{opacity:.85}
.flag-chip.active{opacity:1}
.flag-chip:active{transform:scale(.9)}
.fimg{width:36px;height:25px;object-fit:cover;display:block;border-radius:2px;
  -webkit-mask-image:radial-gradient(ellipse 100% 100% at 50% 50%,#000 42%,rgba(0,0,0,.5) 70%,transparent 98%);
  mask-image:radial-gradient(ellipse 100% 100% at 50% 50%,#000 42%,rgba(0,0,0,.5) 70%,transparent 98%);
  filter:saturate(.7) brightness(.78);transition:filter .25s}
.flag-chip.active .fimg{filter:saturate(1.05) brightness(1)}
.flag-n{font-size:8.5px;color:var(--muted2);font-variant-numeric:tabular-nums;line-height:1}
.flag-chip.active .flag-n{color:var(--rose)}
.flag-bar{width:16px;height:2px;border-radius:99px;background:transparent;transition:background .2s}
.flag-chip.active .flag-bar{background:var(--rose)}
.flag-chip.reset{opacity:.6;width:36px;height:25px;border:1px dashed var(--border);border-radius:5px;align-items:center;justify-content:center;display:flex;flex-direction:row;color:#888;font-size:12px}
.flag-chip.reset:hover{opacity:1;color:var(--text)}

/* ── Paliers intermédiaires ── */
.palier-strip{display:flex;flex-wrap:wrap;align-items:center;gap:5px;padding:7px 10px;border-top:1px solid var(--border)}
.palier-strip-lbl{font-size:8px;text-transform:uppercase;letter-spacing:.1em;color:var(--muted2);margin-right:2px}

<body>
<header><div class="logo">WC 2026</div><div class="h-stats" id="hStats"></div><div style="display:flex;align-items:center;gap:10px;margin-left:12px"><span id="syncIndicator" style="font-size:10px;letter-spacing:.08em;color:#555">● sync</span></div></header>
<nav><button class="active" onclick="goTab('dash',this)">Vue d'ensemble</button><button onclick="goTab('joueurs',this)">Joueurs</button><button onclick="goTab('tickets',this)">Tickets</button><button onclick="goTab('reseau',this)">Réseau</button><button onclick="goTab('alertes',this)">Alertes</button></nav>
<main><div id="dash" class="tab active"></div><div id="joueurs" class="tab"></div><div id="tickets" class="tab"></div><div id="reseau" class="tab"></div><div id="alertes" class="tab"></div></main>

<script>
/* WC2026 - moteur de calcul - ES5 pur, ASCII only (compatible Safari iOS et Chrome) */
/* Aucune dependance, aucun DOM. Fonctions pures: (source + etat) -> calculs. */
var WC = (function () {
  "use strict";

  function norm(s) {
    s = String(s == null ? "" : s).toLowerCase();
    s = s.normalize ? s.normalize("NFD").replace(/[\u0300-\u036f]/g, "") : s;
    s = s.replace(/-/g, " ").replace(/\s+/g, " ");
    return s.replace(/^\s+|\s+$/g, "");
  }
  function selKey(sel) { return norm(sel.joueur) + "|" + norm(sel.pays) + "|" + norm(sel.type); }
  function paysKey(sel) { return norm(sel.pays); }

  /* etat derive d'une selection a partir de l'etat dynamique */
  function selState(sel, players, pays) {
    var k = selKey(sel);
    var ps = players[k] || { status: "attente", n_egalite: 1 };
    var status = ps.status || "attente";
    var neg = ps.n_egalite || 1;
    var paysSt = (pays[paysKey(sel)] || { status: "en_course" }).status;
    /* figement: pays elimine ne peut plus etre attente -> force depasse */
    if (paysSt === "elimine" && status === "attente") status = "depasse";
    /* sortie definitive */
    var outcome;
    if (paysSt === "en_course") outcome = "potentielle";
    else if (status === "tete") outcome = "gagnee";
    else outcome = "perdue";
    /* couche provisoire: gele maintenant */
    var prov = (outcome === "gagnee" || (outcome === "potentielle" && status === "tete")) ? "gagnante" : "perdante";
    var cote = (sel.cote == null) ? null : sel.cote;
    var coteEff = (cote == null) ? null : Math.max(cote / neg, 1);
    return { key: k, status: status, neg: neg, pays: paysSt, outcome: outcome, prov: prov, cote: cote, coteEff: coteEff };
  }

  /* polynomes symetriques elementaires e[0..m] des valeurs vals */
  function esp(vals) {
    var e = [1], i, j;
    for (i = 0; i < vals.length; i++) { e[i + 1] = 0; for (j = i + 1; j >= 1; j--) { e[j] = e[j] + vals[i] * e[j - 1]; } }
    return e;
  }

  /* sous-ensembles de taille k des indices 0..n-1 (ES5, iteratif) */
  function kcombos(n, k) {
    var res = [], idx = [], i;
    if (k < 0 || k > n) return res;
    for (i = 0; i < k; i++) idx.push(i);
    while (true) {
      res.push(idx.slice());
      i = k - 1;
      while (i >= 0 && idx[i] === n - k + i) i--;
      if (i < 0) break;
      idx[i]++;
      for (var j = i + 1; j < k; j++) idx[j] = idx[j - 1] + 1;
    }
    return res;
  }

  /* calcule un ticket. expo (optionnel) = accumulateur d'exposition par joueur. */
  function computeTicket(tk, players, pays, mise, expo) {
    var parts = String(tk.systeme).split("/");
    var X = parseInt(parts[0], 10), N = parseInt(parts[1], 10);
    var sels = tk.selections, st = [], i, m;
    for (i = 0; i < sels.length; i++) st.push(selState(sels[i], players, pays));

    var G = 0, P = 0, D = 0, provG = 0;
    for (i = 0; i < st.length; i++) {
      if (st[i].outcome === "gagnee") G++;
      else if (st[i].outcome === "potentielle") P++;
      else D++;
      if (st[i].prov === "gagnante") provG++;
    }

    var paliers = [], gainAcquis = 0, gainPotentiel = 0, gainProjete = 0;
    for (var k = X; k <= N; k++) {
      var pal = { k: k, label: k + "/" + N, nCombos: 0, nDead: 0, nLive: 0, nFinal: 0, gainAcquis: 0, gainPotentiel: 0, gainProjete: 0 };
      var cmb = kcombos(st.length, k);
      for (var c = 0; c < cmb.length; c++) {
        var combo = cmb[c], hasPerdue = false, allGagnee = true, allProvGagn = true, coteProd = 1, valid = true;
        for (m = 0; m < combo.length; m++) {
          var s = st[combo[m]];
          if (s.coteEff == null) valid = false;
          if (s.outcome === "perdue") hasPerdue = true;
          if (s.outcome !== "gagnee") allGagnee = false;
          if (s.prov !== "gagnante") allProvGagn = false;
          coteProd *= (s.coteEff == null ? 1 : s.coteEff);
        }
        var g = coteProd * mise;
        pal.nCombos++;
        /* projete = gele maintenant: combo entierement compose de selections provisoirement gagnantes */
        if (allProvGagn) { pal.gainProjete += g; gainProjete += g; }
        var state;
        if (hasPerdue) { pal.nDead++; state = "dead"; }

function eKey(j,p,t){ return WC.norm(j)+'|'+WC.norm(p)+'|'+WC.norm(t); }
function pKeyN(p){ return WC.norm(p); }
function fmt(v){ if(v==null) return '—'; if(!v) return '0€'; if(Math.abs(v)<1) return v.toFixed(2).replace('.',',')+'€'; return Math.round(v).toLocaleString('fr-FR')+'€'; }

/* ---- accès statut / n_egalite (avec repli nom|type) ---- */
function getP(j,p,t){
  const k = eKey(j,p,t);
  if(P[k]) return P[k];
  const n = WC.norm(j), tp = WC.norm(t);
  for(const key in P){ const a=key.split('|'); if(a[0]===n && a[2]===tp) return P[key]; }
  return { status:'attente', n_egalite:1 };
}
function statusOf(j,p,t){ return getP(j,p,t).status; }
function negOf(j,p,t){ return getP(j,p,t).n_egalite||1; }
function paysStatus(p){ return (PAYS[pKeyN(p)]||{status:'en_course'}).status; }

function setStatus(j,p,t,s){
  const k = eKey(j,p,t);
  const cur = P[k] || {status:'attente', n_egalite:1};
  cur.status = s; if(s!=='tete') cur.n_egalite = 1;
  P[k] = cur;
  saveP(k); render();
}
function setNeg(j,p,t,n){
  const k = eKey(j,p,t);
  const cur = P[k] || {status:'tete', n_egalite:1};
  cur.n_egalite = Math.max(1, n|0); P[k] = cur;
  saveP(k); render();
}
function setPays(p,s){
  PAYS[pKeyN(p)] = { status:s };
  savePays(pKeyN(p), s); render();
}
function togglePays(p){ setPays(p, paysStatus(p)==='elimine' ? 'en_course' : 'elimine'); }

/* derive l'etat affichable d'une selection */
function selView(s){
  const st = statusOf(s.joueur,s.pays,s.type);

  let outcome, cls;
  if(py==='en_course'){ outcome='potentielle'; cls=st; }
  else if(st==='tete'){ outcome='gagnee'; cls='gagnant'; }
  else { outcome='perdue'; cls='perdant'; }

}

function subscribe(){

  ws.onmessage=e=>{ try{ const m=JSON.parse(e.data); if(m.event==='INSERT'||m.event==='UPDATE'){ const rec=m.payload&&m.payload.record;
      if(rec&&rec.player_key&&rec.status){ const a=rec.player_key.split('|'); P[WC.norm(a[0])+'|'+WC.norm(a[1]||'')+'|'+WC.norm(a[2]||'')]={status:rec.status,n_egalite:rec.n_egalite||1}; render(); }
      else if(rec&&rec.pays_key&&rec.status){ PAYS[WC.norm(rec.pays_key)]={status:rec.status}; render(); }
      else if(rec&&rec.id&&rec.selections){ var nt=normalizeTicket(rec); var ix=TICKETS.findIndex(function(x){return x.id===nt.id;}); if(ix>=0)TICKETS[ix]=nt; else TICKETS.push(nt); localStorage.setItem('wc26_tickets',JSON.stringify(TICKETS)); render(); } }
      else if(m.event==='DELETE'&&m.payload&&m.payload.old_record&&m.payload.old_record.id){ var did=String(m.payload.old_record.id); TICKETS=TICKETS.filter(function(x){return x.id!==did;}); localStorage.setItem('wc26_tickets',JSON.stringify(TICKETS)); render(); } }catch(_){} };
  ws.onclose=()=>{ clearInterval(hb); setTimeout(subscribe,5000); };
  ws.onerror=()=>ws.close();
}

/* outcome affichable d'une sélection : gagne | perdu | tete | depasse | attente */
function outcomeOf(j,p,t){
  const st = statusOf(j,p,t), py = paysStatus(p);
  if(py==='elimine') return st==='tete' ? 'gagne' : 'perdu';
  return st; // en course : tete | depasse | attente
}
function outcomeSel(s){ return outcomeOf(s.joueur,s.pays,s.type); }
const SEG_COL = { gagne:'var(--c-gagne-light)', tete:'var(--c-tete)', attente:'#e6e6e6', depasse:'var(--c-depasse)', perdu:'#45453f' };
const PRIO    = { gagne:0, tete:1, attente:2, depasse:3, perdu:4 };
function nameStyle(o){
  if(o==='tete')    return 'color:var(--c-tete)';
  if(o==='gagne')   return 'color:var(--c-gagne-light)';
  if(o==='perdu')   return 'color:#7a7a72';
  if(o==='depasse') return 'color:var(--c-depasse)';
  return 'color:#e6e6e6'; // attente -> blanc
}
function pcCls(o){ return 'po-'+o; }

/* jauge à segments : 1 segment / sélection (couleur = outcome), curseur ▼ au-dessus du seuil X */
function segCell(o, neg){
  if((o==='tete'||o==='gagne') && neg>1){
    const colored = o==='gagne' ? 'var(--c-gagne-light)' : 'var(--c-tete)';
    const lost = o==='gagne' ? '#45453f' : '#5a5a52';
    let inner='';
    for(let i=0;i<neg;i++) inner+=`<span class="seg-part" style="background:${i===0?colored:lost}"></span>`;
    return `<span class="seg-split" title="ex-æquo ÷${neg}">${inner}</span>`;
  }
  return `<span class="seg" style="background:${SEG_COL[o]}"></span>`;
}
function segGauge(tk, X){
  const cells = tk.selections.map(s=>({o:outcomeSel(s), neg:negOf(s.joueur,s.pays,s.type)})).sort((a,b)=>PRIO[a.o]-PRIO[b.o]);
  const N = cells.length;
  const bars = cells.map(c=>segCell(c.o,c.neg)).join('');
  const left = ((X-0.5)/N*100);
  return `<div class="seg-wrap"><div class="seg-cursor" style="left:${left}%">▼</div><div class="seg-row">${bars}</div></div>`;
}

let FILTER_PAYS = '';   // filtre pays (Joueurs)
var TF = { pays:{}, joueurs:{}, type:'all' };  // filtre cumule (Tickets + Reseau)
function tfCount(){ return Object.keys(TF.pays).length + Object.keys(TF.joueurs).length + (TF.type!=='all'?1:0); }
function tfTogglePays(k){ if(TF.pays[k])delete TF.pays[k]; else TF.pays[k]=1; render(); }
function tfToggleJoueur(k){ if(!k)return; if(TF.joueurs[k])delete TF.joueurs[k]; else TF.joueurs[k]=1; render(); }
function tfSetType(t){ TF.type=t; render(); }
function tfClear(){ TF={pays:{},joueurs:{},type:'all'}; render(); }
function tfAddJoueurByLabel(v){ var k=JLABEL2KEY[v]; if(k){ TF.joueurs[k]=1; render(); } }
function tkPasseTF(tk){
  if(TF.type!=='all' && !tk.selections.some(function(s){return s.type===TF.type;})) return false;
  for(var p in TF.pays){ if(!tk.selections.some(function(s){return pKeyN(s.pays)===p;})) return false; }
  for(var j in TF.joueurs){ if(!tk.selections.some(function(s){return eKey(s.joueur,s.pays,s.type)===j;})) return false; }
  return true;
}
var JLABEL2KEY={};
function joueurLabels(){ JLABEL2KEY={}; var seen={},out=[]; TICKETS.forEach(function(t){t.selections.forEach(function(s){var k=eKey(s.joueur,s.pays,s.type); if(seen[k])return; seen[k]=1; var lab=cap(s.joueur)+' ('+pays3(s.pays)+(s.type==='passeur'?', P':'')+')'; JLABEL2KEY[lab]=k; out.push(lab);});}); return out.sort(); }
let TFILTER_CAT = null; // filtre statut (onglet Tickets)
let DASH_FILTER = null; // filtre liste tickets (Vue d'ensemble)

function render(){
  const R = WC.computeAll(SRC(), P, PAYS);
  renderHeader(R);
  if(TAB==='dash') renderDash(R);
  else if(TAB==='joueurs') renderJoueurs(R);
  else if(TAB==='tickets') renderTickets(R);
  else if(TAB==='alertes') renderAlertes(R);
  else if(TAB==='reseau') renderReseau(R);
  if(OVERLAY_ID && OVERLAY_ID!=='__form__') drawOverlay();
}

function hs(n,l,c){ return `<div class="h-stat"><span class="h-stat-n" style="color:${c||'var(--rose)'}">${n}</span><span class="h-stat-l">${l}</span></div>`; }
function renderHeader(R){
  const T0=R.totaux; let nTete=0; for(const k in P) if(P[k].status==='tete') nTete++;
  let nElim=0; for(const k in PAYS) if(PAYS[k].status==='elimine') nElim++;
  document.getElementById('hStats').innerHTML =
    hs(fmt(T0.gainProjete),'projeté gelé','var(--c-gagne-light)') +
    hs(fmt(T0.gainAcquis),'acquis','var(--c-gagne-light)') +
    hs(fmt(T0.gainPotentiel),'plafond','var(--muted2)') +
    hs(nTete,'en tête') +
    hs(T0.nVirtuel,'virt. gagnants','var(--c-gagne-light)') +
    hs(T0.nEnCours,'en cours') +
    hs(nElim,'pays sortis','var(--muted2)');
}

function cat(r){ if(r.statut==='gagne') return 'gagne'; if(r.statut==='perdu') return 'mort'; if(r.virtuel) return 'vivant'; if(r.provG===r.X-1) return 'proche'; return 'encours'; }

/* ---- bandeau pays (filtre + bascule éliminé) ---- */
function paysBanner(){
  const m={}; TICKETS.forEach(t=>t.selections.forEach(s=>{ const k=pKeyN(s.pays); (m[k]=m[k]||{nom:s.pays,n:0}).n++; }));
  const arr=Object.entries(m).map(([k,v])=>({k,...v})).sort((a,b)=>b.n-a.n);
  let h=`<div class="pays-bar">`;
  arr.forEach(p=>{ const elim=paysStatus(p.nom)==='elimine'; const act=FILTER_PAYS===p.k;
    h+=`<span class="pays-chip ${elim?'elim':''} ${act?'active':''}" onclick="filtPays('${esc(p.k)}')">
        <span class="pcn" title="${p.nom}">${pays3(p.nom)}</span><span class="pcc">${elim?'sorti':p.n}</span>
        <button class="pays-x" title="bascule en course/éliminé" onclick="event.stopPropagation();togglePays('${esc(p.nom)}')">${elim?'↺':'✕'}</button></span>`; });
  h+=`</div>`;
  return h;
}
function filtPays(k){ FILTER_PAYS = (FILTER_PAYS===k)?'':k; render(); }

/* ---- VUE D'ENSEMBLE ---- */
function renderDash(R){
  const T0=R.totaux;
  const cats={gagne:0,vivant:0,proche:0,encours:0,mort:0}; R.tickets.forEach(r=>cats[cat(r)]++);
  let html='';
  // 3 mesures
  html += `<div class="gains-row">
    <div class="gain-kpi"><div class="gain-n" style="color:var(--c-gagne-light)">${fmt(T0.gainProjete)}</div><div class="gain-l">Projeté · gelé maintenant</div></div>
    <div class="gain-kpi"><div class="gain-n" style="color:var(--c-tete)">${fmt(T0.gainProchain)}</div><div class="gain-l">Prochain plancher · 1 flip probable</div></div>
    <div class="gain-kpi"><div class="gain-n" style="color:var(--c-gagne-light)">${fmt(T0.gainAcquis)}</div><div class="gain-l">Acquis · définitif</div></div>
    <div class="gain-kpi"><div class="gain-n" style="color:var(--muted2)">${fmt(T0.gainPotentiel)}</div><div class="gain-l">Plafond · max possible</div></div>
  </div>`;
  // analytics row : donut + barres montants + proches + top pays
  html += `<div class="ana-row">`;
  // donut
  const legend=[['gagne','Gagnés','var(--c-gagne)'],['vivant','Virt. gagnants','var(--c-gagne-light)'],['proche','Proches','var(--c-tete)'],['encours','En cours','var(--c-depasse)'],['mort','Morts','#45453f']];
  html += `<div class="ana-card"><div class="ana-h">Tickets par statut <span class="ana-sub">clic = filtre</span></div>
    <div class="donut-wrap">${donutSVG(cats,legend)}<div class="donut-leg">${legend.map(([k,l,c])=>`<div class="dleg ${DASH_FILTER===k?'on':''}" onclick="setDashFilter('${k}')"><span class="dleg-dot" style="background:${c}"></span>${l}<span class="dleg-n">${cats[k]||0}</span></div>`).join('')}</div></div></div>`;
  // barres montants
  const mx=Math.max(T0.gainPotentiel,1);
  const bar=(l,v,c)=>`<div class="mbar"><span class="mbar-l">${l}</span><div class="mbar-tk"><div class="mbar-f" style="width:${Math.max(2,v/mx*100)}%;background:${c}"></div></div><span class="mbar-v" style="color:${c}">${fmt(v)}</span></div>`;
  html += `<div class="ana-card"><div class="ana-h">Montants €</div>
    ${bar('Projeté',T0.gainProjete,'var(--c-gagne-light)')}
    ${bar('Prochain',T0.gainProchain,'var(--c-tete)')}
    ${bar('Acquis',T0.gainAcquis,'var(--c-gagne-light)')}
    ${bar('Plafond',T0.gainPotentiel,'#7a7a72')}</div>`;
  // proches (à 1 joueur d'un palier)
  const proches=R.tickets.filter(r=>r.provG===r.X-1 && r.statut!=='perdu').sort((a,b)=>b.gainProjete-a.gainProjete);
  html += `<div class="ana-card"><div class="ana-h">À 1 joueur d'un palier <span class="ana-sub">${proches.length} · clic = ouvrir</span></div>`;
  if(!proches.length) html+=`<div class="empty">—</div>`;
  proches.slice(0,6).forEach(r=>{ const tk=TICKETS.find(x=>x.id===r.id);
    html+=`<div class="prow" onclick="openOverlay('${r.id}')"><span class="prow-n">${tk.nom}</span><span class="prow-f">${r.provG+1}/${r.X}</span><span class="prow-g">+${fmt(r.paliers[0].gainProjete)}</span></div>`; });
  html += `</div>`;
  // top pays
  const pm={}; TICKETS.forEach(t=>t.selections.forEach(s=>{ const k=pKeyN(s.pays); (pm[k]=pm[k]||{nom:s.pays,n:0}).n++; }));
  const pa=Object.values(pm).sort((a,b)=>b.n-a.n).slice(0,7); const pmax=pa[0]?pa[0].n:1;
  html += `<div class="ana-card"><div class="ana-h">Top pays <span class="ana-sub">clic = filtre tickets</span></div>`;
  pa.forEach(p=>{ html+=`<div class="mbar" style="cursor:pointer" onclick="goPaysTickets('${pKeyN(p.nom)}')"><span class="mbar-l" style="width:78px">${p.nom}</span><div class="mbar-tk"><div class="mbar-f" style="width:${p.n/pmax*100}%;background:var(--c-tete)"></div></div><span class="mbar-v">${p.n}</span></div>`; });
  html += `</div></div>`;
  // liste tickets segmentée
  html += `<div class="label">Tous les tickets ${DASH_FILTER?`· filtre <span class="chart-reset" onclick="setDashFilter(null)">✕ ${DASH_FILTER}</span>`:''}</div><div class="tklist">`;
  sortTk(R.tickets).forEach(r=>{ if(DASH_FILTER && cat(r)!==DASH_FILTER) return; html+=tkLine(r); });
  html += `</div>`;
  document.getElementById('dash').innerHTML = html;
}
function setDashFilter(k){ DASH_FILTER=(DASH_FILTER===k)?null:k; render(); }
function goPaysTickets(k){ FILTER_PAYS=k; goTabByName('Tickets','tickets'); }

function donutSVG(cats,legend){
  const total=legend.reduce((s,[k])=>s+(cats[k]||0),0)||1; const R=52,C=2*Math.PI*R; let off=0,segs='';
  legend.forEach(([k,,col])=>{ const v=cats[k]||0; if(!v) return; const len=v/total*C;
    segs+=`<circle r="${R}" cx="70" cy="70" fill="none" stroke="${col}" stroke-width="15" stroke-dasharray="${len} ${C-len}" stroke-dashoffset="${-off}" transform="rotate(-90 70 70)" style="cursor:pointer" onclick="setDashFilter('${k}')"></circle>`; off+=len; });
  const tot=legend.reduce((s,[k])=>s+(cats[k]||0),0);
  return `<svg viewBox="0 0 140 140" width="132" height="132">${segs}<text x="70" y="68" text-anchor="middle" fill="var(--text)" font-size="28" font-weight="700">${tot}</text><text x="70" y="88" text-anchor="middle" fill="var(--muted2)" font-size="9" letter-spacing="1.5">TICKETS</text></svg>`;
}

/* tri tickets : acquis puis virtuels en tete, perdus en queue, sinon gain max decroissant */
function tkSortKey(r){ return r.statut==='gagne'?0 : r.virtuel?1 : r.statut==='perdu'?3 : 2; }
function sortTk(arr){ return arr.slice().sort(function(a,b){ return (tkSortKey(a)-tkSortKey(b)) || (b.maxEnCours-a.maxEnCours); }); }

/* ligne ticket segmentée (dash + réutilisable) */
function tkLine(r){
  const tk=TICKETS.find(x=>x.id===r.id);
  const badge = r.statut==='gagne'?'win':r.statut==='perdu'?'idle':r.virtuel?'win':cat(r)==='proche'?'close':'idle';
  const blab  = r.statut==='gagne'?'gagné':r.statut==='perdu'?'perdu':r.virtuel?'virt.':cat(r)==='proche'?'proche':'en cours';
  return `<div class="tk-line" onclick="openOverlay('${r.id}')">
    <span class="tk-nom">${tk.nom}</span><span class="tk-sys">${tk.systeme}</span>
    <div class="tk-seg">${segGauge(tk,r.X)}</div>
    <span class="tk-frac">${r.provG}/${r.X}</span>
    <span class="tcard-badge ${badge}">${blab}</span>
    <span class="tk-gain" style="color:var(--c-gagne-light)">${fmt(r.gainProjete)} <span style="color:var(--c-tete);font-size:10px;font-weight:600">▸${fmt(r.gainProchain)}</span></span></div>`;
}

/* ---- JOUEURS ---- */
function renderJoueurs(R){
  let html = `<div class="add-row"><button class="add-tk-btn" onclick="openTicketForm()">+ Ajouter un ticket</button></div><div class="label">Pays — clic = filtrer · ✕ = bascule en course / éliminé</div>${paysBanner()}<input class="jfilter" placeholder="Filtrer un joueur ou un pays" oninput="setJQ(this.value)" value="${JQ.replace(/"/g,'&quot;')}">`;
  html += `<div class="filters"><input id="pfilter" placeholder="Filtrer un joueur…" value="${FILTER}" oninput="FILTER=this.value;render()"></div>`;
  const cnt={}; TICKETS.forEach(t=>t.selections.forEach(s=>{ const k=eKey(s.joueur,s.pays,s.type); cnt[k]=(cnt[k]||0)+1; }));
  const pcat=derivePlayers(); const players=Object.keys(pcat).map(k=>pcat[k]).sort((a,b)=>(cnt[b.k]||0)-(cnt[a.k]||0));
  const expo=R.exposition;
  html += `<div class="pgrid">`;
  players.forEach(pl=>{
    const a=pl.k.split('|');
    if(FILTER && !cap(a[0]).toLowerCase().includes(FILTER.toLowerCase())) return;
    if(FILTER_PAYS && pKeyN(pl.pays)!==FILTER_PAYS) return;
    const cur=getP(pl.joueur,pl.pays,pl.type); const o=outcomeOf(pl.joueur,pl.pays,pl.type);
    const neg=cur.n_egalite||1; const ex=expo[pl.k];
    html += `<div class="pcard ${pcCls(o)}" data-s="${WC.norm(pl.joueur+' '+pl.pays)}"><div class="pcard-top">
        <div class="pcard-name" style="${nameStyle(o)}">${cap(a[0])}</div>
        <div class="pcard-count ${cnt[pl.k]>=4?'hi':''}">${cnt[pl.k]||0}×</div></div>
      <div class="pcard-meta"><span title="${pl.pays}">${pays3(pl.pays)}${paysStatus(pl.pays)==='elimine'?' ✕':''}</span><span class="tbadge ${pl.type}">${pl.type}</span><span class="cote-badge">×${pl.cote_ref}</span>${ex?`<span class="cote-badge port">porte ${fmt(ex.potentiel)}</span>`:''}${ex&&ex.plancher?`<span class="cote-badge" style="color:var(--c-tete)">declenche ${fmt(ex.plancher)}</span>`:''}</div>
      <div class="pcard-btns">
        ${STATUSES.map(s=>`<button class="sbtn ${cur.status===s?'on-'+s:''}" onclick="setStatus('${esc(pl.joueur)}','${esc(pl.pays)}','${pl.type}','${s}')">${SLABELS[s]}</button>`).join('')}
      </div>
      ${cur.status==='tete' ? `<div class="pcard-btns" style="margin-top:4px;align-items:center"><span class="exae-badge">${neg>1?`ex-æquo ÷${neg}`:'seul en tête'} · ${(Math.max(pl.cote_ref/neg,1)).toFixed(2)}</span>
        <button class="mini-sbtn" onclick="setNeg('${esc(pl.joueur)}','${esc(pl.pays)}','${pl.type}',${neg-1})">−</button>
        <button class="mini-sbtn" onclick="setNeg('${esc(pl.joueur)}','${esc(pl.pays)}','${pl.type}',${neg+1})">+</button></div>`:''}
    </div>`;
  });
  html += `</div>`;
  document.getElementById('joueurs').innerHTML = html;
  applyJQ();
}

/* ---- TICKETS ---- */
function setTFilter(c){ TFILTER_CAT=(TFILTER_CAT===c)?null:c; render(); }
function ticketFilterBar(){
  var m={}; TICKETS.forEach(function(t){t.selections.forEach(function(s){var k=pKeyN(s.pays);(m[k]=m[k]||{nom:s.pays,n:0}).n++;});});
  var arr=Object.keys(m).map(function(k){return {k:k,nom:m[k].nom,n:m[k].n};}).sort(function(a,b){return b.n-a.n;});
  var chips=arr.map(function(p){var act=TF.pays[p.k]?'active':''; var elim=paysStatus(p.nom)==='elimine'?'elim':'';
    return '<span class="pays-chip '+elim+' '+act+'" onclick="tfTogglePays(\''+esc(p.k)+'\')"><span class="pcn" title="'+p.nom+'">'+pays3(p.nom)+'</span><span class="pcc">'+p.n+'</span></span>';}).join('');
  var labs=joueurLabels();
  var dl='<datalist id="jdl">'+labs.map(function(l){return '<option value="'+l.replace(/"/g,'&quot;')+'">';}).join('')+'</datalist>';
  var seg='<div class="nseg">'+['all','buteur','passeur'].map(function(t){return '<button class="'+(TF.type===t?'on':'')+'" onclick="tfSetType(\''+t+'\')">'+(t==='all'?'Tous':t==='buteur'?'Buteurs':'Passeurs')+'</button>';}).join('')+'</div>';
  var active='';
  var aj=Object.keys(TF.joueurs), ap=Object.keys(TF.pays);
  if(aj.length||ap.length||TF.type!=='all'){
    active='<div class="tf-active">'+
      ap.map(function(k){return '<span class="tf-chip" onclick="tfTogglePays(\''+esc(k)+'\')">'+pays3(m[k]?m[k].nom:k)+' ✕</span>';}).join('')+
      aj.map(function(k){var a2=k.split('|'); return '<span class="tf-chip" onclick="tfToggleJoueur(\''+esc(k)+'\')">'+cap(a2[0])+' ✕</span>';}).join('')+
      '<span class="tf-clear" onclick="tfClear()">tout effacer</span></div>';
  }
  return '<div class="label">Filtres cumulés (ET) — pays · joueur · type</div>'+
    '<div class="tf-row">'+seg+'<input class="jfilter tf-jin" list="jdl" placeholder="Ajouter un joueur…" onchange="tfAddJoueurByLabel(this.value);this.value=\'\'"></div>'+dl+
    '<div class="pays-bar">'+chips+'</div>'+active;
}
function renderTickets(R){
  let html = ticketFilterBar();
  html += `<div class="legend">
    <span class="leg" onclick="setTFilter('gagne')"><span class="leg-dot" style="background:var(--c-gagne)"></span>gagné</span>
    <span class="leg" onclick="setTFilter('vivant')"><span class="leg-dot" style="background:var(--c-gagne-light)"></span>virt. gagnant</span>
    <span class="leg" onclick="setTFilter('proche')"><span class="leg-dot" style="background:var(--c-tete)"></span>proche</span>
    <span class="leg" onclick="setTFilter('encours')"><span class="leg-dot" style="background:var(--c-depasse)"></span>en cours</span>
    <span class="leg" onclick="setTFilter('mort')"><span class="leg-dot" style="background:#45453f"></span>perdu</span>
    ${TFILTER_CAT?`<span class="chart-reset" onclick="setTFilter(null)">✕ ${TFILTER_CAT}</span>`:''}</div>`;
  html += `<div class="tgrid">`;
  sortTk(R.tickets).forEach(r=>{
    const c=cat(r); if(TFILTER_CAT && c!==TFILTER_CAT) return;
    const tk=TICKETS.find(x=>x.id===r.id);
    if(!tkPasseTF(tk)) return;
    const badge=r.statut==='gagne'?'win':r.statut==='perdu'?'idle':r.virtuel?'win':c==='proche'?'close':'idle';
    const blab=r.statut==='gagne'?'gagné':r.statut==='perdu'?'perdu':r.virtuel?'virt. gagnant':c==='proche'?'proche':'en cours';
    html += `<div class="tcard">
      <div class="tcard-head" onclick="openOverlay('${r.id}')">
        <span class="tcard-nom">${tk.nom}</span><span class="tcard-max" title="montant max encore atteignable">↑ ${fmt(r.maxEnCours)}</span><span class="tcard-sys">${tk.systeme}</span>
        <span class="tcard-frac">${r.provG}/${r.X}</span>
        <span class="tcard-badge ${badge}">${blab}</span>
        <span class="tcard-gain-head" style="color:var(--c-gagne-light)">${fmt(r.gainProjete)} <span style="color:var(--c-tete);font-size:10px">▸${fmt(r.gainProchain)}</span></span>
        <span class="tcard-expand-icon">▸</span></div>
      <div class="tcard-seg">${segGauge(tk,r.X)}</div>
    </div>`;
  });
  html += `</div>`;
  document.getElementById('tickets').innerHTML = html;
}

/* ---- ALERTES ---- */
function renderAlertes(R){
  let html='';
  const virt=R.tickets.filter(r=>r.virtuel);
  const proche=R.tickets.filter(r=>r.provG===r.X-1 && r.statut!=='perdu');
  if(virt.length){ html+=`<div class="label">Virtuellement gagnants (gelé maintenant)</div>`;
    virt.forEach(r=>{ const tk=TICKETS.find(x=>x.id===r.id); html+=`<div class="alert win" onclick="openOverlay('${r.id}')"><strong>${tk.nom}</strong> ${tk.systeme} — <span class="ok">${r.provG}/${r.X}</span> · projeté <span class="gain-tag">${fmt(r.gainProjete)}</span></div>`; }); }
  if(proche.length){ html+=`<div class="label">À une sélection du palier</div>`;
    proche.forEach(r=>{ const tk=TICKETS.find(x=>x.id===r.id); html+=`<div class="alert close" onclick="openOverlay('${r.id}')"><strong>${tk.nom}</strong> ${tk.systeme} — il manque <span class="hi">1</span> pour ${r.X}/${r.N} · +${fmt(r.paliers[0].gainProjete)}</div>`; }); }
  if(!html) html=`<div class="empty">Rien à signaler</div>`;
  document.getElementById('alertes').innerHTML = html;
}

/* ---- OVERLAY (détail ticket) ---- */
function openOverlay(id){ OVERLAY_ID=id; SHEET_K=null; document.body.style.overflow='hidden'; drawOverlay(); document.getElementById('tcardOverlay').classList.add('open'); }
function closeOverlay(e){ if(e&&e.target&&!e.target.classList.contains('tcard-overlay')&&!e.target.classList.contains('tcard-sheet-close'))return; document.getElementById('tcardOverlay').classList.remove('open'); document.body.style.overflow=''; OVERLAY_ID=null; SHEET_K=null; }
function filterK(k){ SHEET_K=k; drawOverlay(); }
function deployedCombos(tk){ const [X,N]=tk.systeme.split('/').map(Number); const out=[]; for(let k=X;k<=N;k++){ WC.kcombos(tk.selections.length,k).forEach(idx=>out.push({k,sels:idx.map(i=>tk.selections[i])})); } return out; }
function drawOverlay(){
  const tk=TICKETS.find(x=>x.id===OVERLAY_ID); if(!tk) return;
  const r=WC.computeTicket(tk,P,PAYS,MISE,null);
  const combos=deployedCombos(tk).map(c=>{ let prod=1,dead=false,allG=true,allPg=true; c.sels.forEach(s=>{ const o=outcomeSel(s); const neg=negOf(s.joueur,s.pays,s.type); const ce=Math.max(s.cote/neg,1); prod*=ce; if(o==='perdu')dead=true; if(o!=='gagne')allG=false; if(!(o==='gagne'||o==='tete'))allPg=false; });
    return {k:c.k, sels:c.sels, gain:prod*MISE, state: dead?'dead':(allG?'finalized':(allPg?'projete':'live'))}; });
  let combosF=combos.filter(c=>SHEET_K?c.k===SHEET_K:true).sort((a,b)=>b.gain-a.gain);
  const sel = tk.selections.map(s=>{ const o=outcomeSel(s); const neg=negOf(s.joueur,s.pays,s.type); const cur=statusOf(s.joueur,s.pays,s.type);
    return `<div class="sheet-sel"><span class="seg" style="width:9px;height:9px;flex:none;border-radius:50%;background:${SEG_COL[o]}"></span>
      <span class="sheet-sel-name" style="${nameStyle(o)}">${cap(s.joueur)}</span>

      <button class="mini-sbtn ${paysStatus(s.pays)==='elimine'?'on-depasse':''}" title="pays en course / éliminé" onclick="togglePays('${esc(s.pays)}')">⚑</button></span></div>`; }).join('');
  const paliers = r.paliers.map(p=>{ const cl=p.mort?'mort':(p.manqueProv<=1?'next':''); const w=Math.min(100,p.gainProjete/(r.gainPotentiel||1)*100*4);

  const gcol={finalized:'var(--c-gagne-light)',projete:'var(--c-tete)',live:'#cfcfcf',dead:'#6a6a6a'};
  const list = combosF.slice(0,140).map(c=>`<div class="ut-row u-${c.state}"><span class="ut-names">${c.sels.map(s=>`<span style="${nameStyle(outcomeSel(s))}">${cap(s.joueur)}</span>`).join(' + ')}</span><span class="ut-gain" style="color:${gcol[c.state]}">${fmt(c.gain)}</span></div>`).join('');
  document.getElementById('tcardOverlay').innerHTML = `<div class="tcard-sheet">
    <div class="tcard-sheet-head"><span class="tcard-nom" style="font-size:15px">${tk.nom}</span><span class="tcard-sys">${tk.systeme}</span>
      <span class="tcard-badge ${r.virtuel||r.statut==='gagne'?'win':r.statut==='perdu'?'idle':'idle'}">${r.statut==='gagne'?'gagné':r.statut==='perdu'?'perdu':r.virtuel?'virt. gagnant':'en cours'}</span>
      <button class="mini-sbtn" style="margin-left:auto" onclick="deleteTicket('${tk.id}')">Supprimer</button>
      <button class="tcard-sheet-close" onclick="closeOverlay()">✕</button></div>
    <div class="tcard-sheet-body">
      <div class="tcard-sheet-col">
        <div class="sheet-kpi-row">
          <div class="sheet-kpi"><div class="sheet-kpi-n green">${fmt(r.gainProjete)}</div><div class="sheet-kpi-l">projeté gelé</div></div>
          <div class="sheet-kpi"><div class="sheet-kpi-n" style="color:var(--c-tete)">${fmt(r.gainProchain)}</div><div class="sheet-kpi-l">prochain${r.prochainJoueur?' · '+cap(r.prochainJoueur):''}</div></div>
          <div class="sheet-kpi"><div class="sheet-kpi-n green">${fmt(r.gainAcquis)}</div><div class="sheet-kpi-l">acquis</div></div>
          <div class="sheet-kpi"><div class="sheet-kpi-n muted">${fmt(r.gainPotentiel)}</div><div class="sheet-kpi-l">plafond</div></div>
        </div>
        <div class="tcard-seg" style="margin:4px 0 10px">${segGauge(tk,r.X)}</div>
        <div><div class="tcard-sheet-section">Sélections — ${r.provG}/${r.X} provisoires · ${r.G} acquises</div>${sel}</div>
      </div>
      <div class="tcard-sheet-col">
        <div><div class="tcard-sheet-section">Paliers ${SHEET_K?`· filtre ${SHEET_K}/${r.N} <span class="chart-reset" onclick="filterK(null)">✕</span>`:''}</div>${paliers}</div>
        <div><div class="tcard-sheet-section">Combos ${SHEET_K?'('+SHEET_K+'/'+r.N+')':''} — triés par gain</div><div class="ut-list">${list||'<div class="empty">aucun</div>'}</div></div>
      </div>
    </div></div>`;
}

function goTab(id,btn){ TAB=id; document.querySelectorAll('nav button').forEach(b=>b.classList.remove('active')); if(btn)btn.classList.add('active'); document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active')); document.getElementById(id).classList.add('active'); render(); }

function cap(s){ return (s||'').split(' ').map(w=>w?w.charAt(0).toUpperCase()+w.slice(1):w).join(' '); }
function esc(s){ return String(s).replace(/'/g,"\\'"); }

/* ===== Option B : catalogue derive + formulaire ticket ===== */
function derivePlayers(){ var m={}; TICKETS.forEach(function(t){ (t.selections||[]).forEach(function(s){ var k=eKey(s.joueur,s.pays,s.type); if(!m[k]) m[k]={k:k,joueur:s.joueur,pays:s.pays,type:s.type,cote_ref:(s.cote!=null?s.cote:((RAW.players[k]&&RAW.players[k].cote_ref)||1))}; }); }); return m; }
var FORM_SELS=[];
function fval(id){ var e=document.getElementById(id); return e?e.value:''; }
function openTicketForm(){ OVERLAY_ID='__form__'; FORM_SELS=[{joueur:'',pays:'',type:'buteur',cote:'',neg:1}]; document.body.style.overflow='hidden'; drawForm(); document.getElementById('tcardOverlay').classList.add('open'); }
function formRead(){ FORM_SELS.forEach(function(s,i){ s.joueur=fval('f_j'+i); s.pays=fval('f_p'+i); s.type=fval('f_t'+i); s.cote=fval('f_c'+i); s.neg=fval('f_n'+i)||1; }); }
function formAddSel(){ formRead(); FORM_SELS.push({joueur:'',pays:'',type:'buteur',cote:'',neg:1}); drawForm(); }
function formDelSel(i){ formRead(); FORM_SELS.splice(i,1); if(!FORM_SELS.length)FORM_SELS.push({joueur:'',pays:'',type:'buteur',cote:'',neg:1}); drawForm(); }
function drawForm(){

  var rows=FORM_SELS.map(function(s,i){ return '<div class="form-sel">'+

    '<input id="f_p'+i+'" list="dlP" placeholder="Pays" value="'+(s.pays||'').replace(/"/g,'&quot;')+'">'+
    '<select id="f_t'+i+'"><option value="buteur"'+(s.type==='buteur'?' selected':'')+'>buteur</option><option value="passeur"'+(s.type==='passeur'?' selected':'')+'>passeur</option></select>'+
    '<input id="f_c'+i+'" type="number" step="0.01" placeholder="cote" value="'+(s.cote||'')+'" style="width:62px">'+
    '<input id="f_n'+i+'" type="number" min="1" value="'+(s.neg||1)+'" style="width:44px" title="egalite">'+
    '<button class="mini-sbtn" onclick="formDelSel('+i+')">\u2715</button></div>'; }).join('');
  var N=FORM_SELS.length;
  document.getElementById('tcardOverlay').innerHTML='<div class="tcard-sheet form-sheet">'+
    '<div class="tcard-sheet-head"><span class="tcard-nom" style="font-size:15px">Nouveau ticket</span>'+
    '<button class="tcard-sheet-close" onclick="closeOverlay()">\u2715</button></div>'+
    '<div class="form-body">'+dlJ+dlP+
    '<div class="form-line"><input id="f_nom" placeholder="Nom (ex 49k)" value="'+fval('f_nom').replace(/"/g,'&quot;')+'">'+
    '<input id="f_ref" placeholder="Ref (option)" value="'+fval('f_ref').replace(/"/g,'&quot;')+'">'+
    '<label class="form-x">Systeme&nbsp;<input id="f_x" type="number" min="1" max="'+N+'" value="'+(fval('f_x')||N)+'" style="width:50px"> / '+N+'</label></div>'+
    '<div class="form-sec">Selections ('+N+')</div>'+rows+
    '<button class="add-tk-btn" style="margin-top:8px" onclick="formAddSel()">+ selection</button>'+
    '<div class="form-actions"><button class="mini-sbtn" onclick="closeOverlay()">Annuler</button><button class="add-tk-btn" onclick="saveTicketForm()">Enregistrer</button></div>'+
    '</div></div>';
}
function saveTicketForm(){
  formRead();
  var nom=fval('f_nom').trim(), X=parseInt(fval('f_x'),10), N=FORM_SELS.length;
  if(!nom){ alert('Nom requis'); return; }
  if(!(X>=1&&X<=N)){ alert('Systeme invalide : il faut 1 <= X <= '+N); return; }
  var cat=derivePlayers(), nameMap={}; Object.keys(cat).forEach(function(k){ nameMap[WC.norm(cat[k].joueur)]=cat[k].joueur; });
  var sels=[];
  for(var i=0;i<FORM_SELS.length;i++){ var s=FORM_SELS[i];
    if(!s.joueur||!s.pays||!s.cote){ alert('Selection '+(i+1)+' : joueur, pays et cote requis'); return; }
    var j=s.joueur.trim(), canon=nameMap[WC.norm(j)]; if(canon)j=canon;
    sels.push({joueur:j,pays:s.pays.trim(),type:s.type,cote:+s.cote,n_egalite:Math.max(1,parseInt(s.neg,10)||1)});
  }
  saveTicket({id:String(Date.now()),nom:nom,systeme:X+'/'+N,ref:(fval('f_ref').trim()||null),selections:sels});
}
async function saveTicket(tk){
  var ix=TICKETS.findIndex(function(x){return x.id===tk.id;}); if(ix>=0)TICKETS[ix]=tk; else TICKETS.push(tk);
  localStorage.setItem('wc26_tickets', JSON.stringify(TICKETS)); closeOverlay(); render();
  try{ await fetch(SUPA_URL+'/rest/v1/tickets?on_conflict=id',{method:'POST',headers:Object.assign({},HJ,{'Prefer':'resolution=merge-duplicates,return=minimal'}),body:JSON.stringify({id:tk.id,nom:tk.nom,systeme:tk.systeme,ref:tk.ref,selections:tk.selections,updated_at:new Date().toISOString()})}); syncDot(true);}catch(e){ syncDot(false); }
}
async function deleteTicket(id){ if(!confirm('Supprimer ce ticket ?'))return; TICKETS=TICKETS.filter(function(x){return x.id!==id;}); localStorage.setItem('wc26_tickets',JSON.stringify(TICKETS)); closeOverlay(); render();
  try{ await fetch(SUPA_URL+'/rest/v1/tickets?id=eq.'+encodeURIComponent(id),{method:'DELETE',headers:HJ}); }catch(e){} }

document.addEventListener('keydown',e=>{ if(e.key==='Escape') closeOverlay(); });
init();

/* ============================================================
   ONGLET RESEAU - graphe joueurs (noms primaires, liens au survol)
   partage le filtre cumule TF avec la vue Tickets
   ============================================================ */
var NET = { built:false, sig:'', pos:{}, nodeEls:{}, edgeEls:[], nodes:[], adj:{}, tx:0, ty:0, sc:1 };

function netBuildData(){
  var nodes={}, adj={}, edges=[], eseen={};
  TICKETS.forEach(function(t){
    var ids=[];
    t.selections.forEach(function(s){
      var k=eKey(s.joueur,s.pays,s.type);
      if(!nodes[k]) nodes[k]={id:k,name:s.joueur,pays:s.pays,type:s.type,freq:0};
      nodes[k].freq++; ids.push(k);
    });
    ids=ids.filter(function(v,i){return ids.indexOf(v)===i;});
    for(var i=0;i<ids.length;i++)for(var j=i+1;j<ids.length;j++){ var pr=ids[i]<ids[j]?[ids[i],ids[j]]:[ids[j],ids[i]]; eseen[pr[0]+'~'+pr[1]]=pr; }
  });
  Object.keys(eseen).forEach(function(kk){ edges.push(eseen[kk]); });
  Object.keys(nodes).forEach(function(k){adj[k]=[];});
  edges.forEach(function(e){ adj[e[0]].push(e[1]); adj[e[1]].push(e[0]); });
  return {nodes:nodes,edges:edges,adj:adj};
}

function netLayout(ids, edges){
  var W=1000,H=1000, k=Math.sqrt((W*H)/Math.max(1,ids.length)), pos={};
  var rnd=1; function rr(){ rnd=(rnd*9301+49297)%233280; return rnd/233280; }
  ids.forEach(function(id){ pos[id]=[rr()*W,rr()*H]; });
  for(var it=0; it<280; it++){
    var disp={}; ids.forEach(function(id){disp[id]=[0,0];});
    for(var i=0;i<ids.length;i++){ for(var j=i+1;j<ids.length;j++){
      var a=ids[i],b=ids[j],dx=pos[a][0]-pos[b][0],dy=pos[a][1]-pos[b][1],d=Math.sqrt(dx*dx+dy*dy)+.01,f=k*k/d,ux=dx/d,uy=dy/d;
      disp[a][0]+=ux*f;disp[a][1]+=uy*f;disp[b][0]-=ux*f;disp[b][1]-=uy*f;
    }}
    edges.forEach(function(e){ var a=e[0],b=e[1],dx=pos[a][0]-pos[b][0],dy=pos[a][1]-pos[b][1],d=Math.sqrt(dx*dx+dy*dy)+.01,f=d*d/k*.5,ux=dx/d,uy=dy/d;
      disp[a][0]-=ux*f;disp[a][1]-=uy*f;disp[b][0]+=ux*f;disp[b][1]+=uy*f; });
    var t=Math.max(2,38*(1-it/280));
    ids.forEach(function(id){ var dx=disp[id][0],dy=disp[id][1],d=Math.sqrt(dx*dx+dy*dy)+1e-9,m=Math.min(d,t);
      pos[id][0]=Math.min(W-20,Math.max(20,pos[id][0]+dx/d*m)); pos[id][1]=Math.min(H-20,Math.max(20,pos[id][1]+dy/d*m)); });
  }
  return pos;
}

function netVisType(n){ return TF.type==='all'||n.type===TF.type; }

function renderReseau(R){
  var sig=TICKETS.map(function(t){return t.id;}).join(',');
  var host=document.getElementById('reseau');
  if(!NET.built || NET.sig!==sig){
    NET.sig=sig;
    var D=netBuildData(); NET.adj=D.adj; NET.nodes=Object.keys(D.nodes).map(function(k){return D.nodes[k];});
    var ids=NET.nodes.map(function(n){return n.id;});
    NET.pos=netLayout(ids,D.edges);
    host.innerHTML='<div class="net-wrap">'+
      '<div class="net-graph" id="netGraph"><svg id="netSvg" viewBox="0 0 1000 1000" preserveAspectRatio="xMidYMid meet"><g id="netView"><g id="netEdges"></g><g id="netNodes"></g></g></svg><div class="net-tip" id="netTip"></div></div>'+
      '<aside class="net-aside"><div class="net-bar"><div class="nseg" id="netSeg"></div><button class="add-tk-btn" style="padding:5px 10px" onclick="tfClear()">Réinitialiser</button><span class="count" id="netCount"></span></div><div class="net-list" id="netList"></div></aside>'+
      '</div>';
    var NS='http://www.w3.org/2000/svg';
    var gE=document.getElementById('netEdges'), gN=document.getElementById('netNodes');
    NET.edgeEls=[]; NET.nodeEls={};
    D.edges.forEach(function(e){
      var a=D.nodes[e[0]],b=D.nodes[e[1]],l=document.createElementNS(NS,'line');
      l.setAttribute('x1',NET.pos[e[0]][0]);l.setAttribute('y1',NET.pos[e[0]][1]);
      l.setAttribute('x2',NET.pos[e[1]][0]);l.setAttribute('y2',NET.pos[e[1]][1]);
      l.setAttribute('class','nedge'); l._a=e[0]; l._b=e[1]; gE.appendChild(l); NET.edgeEls.push(l);
    });
    NET.nodes.forEach(function(n){
      var g=document.createElementNS(NS,'g'); g.setAttribute('class','nnode'); g.setAttribute('transform','translate('+NET.pos[n.id][0]+','+NET.pos[n.id][1]+')');
      var r=4+Math.min(n.freq,14)*1.1;
      var c=document.createElementNS(NS,'circle'); c.setAttribute('r',r); c.setAttribute('fill',n.type==='buteur'?'#7aa2f7':'#e0af68'); c.setAttribute('class','ncirc');
      var t=document.createElementNS(NS,'text'); t.setAttribute('x',r+2); t.setAttribute('y',3); t.textContent=cap(n.name)+(n.type==='passeur'?' (P)':'');
      g.appendChild(c); g.appendChild(t);
      g.addEventListener('click',function(ev){ev.stopPropagation(); tfToggleJoueur(n.id);});
      g.addEventListener('mouseenter',function(){ netSpot([n.id].concat(NET.adj[n.id])); });
      g.addEventListener('mouseleave',function(){ netClearSpot(); });
      gN.appendChild(g); NET.nodeEls[n.id]=g;
    });
    netInitPanZoom();
    NET.built=true;
  }
  // seg type
  document.getElementById('netSeg').innerHTML=['all','buteur','passeur'].map(function(t){return '<button class="'+(TF.type===t?'on':'')+'" onclick="tfSetType(\''+t+'\')">'+(t==='all'?'Tous':t==='buteur'?'Buteurs':'Passeurs')+'</button>';}).join('');
  netUpdate();
}

function netSpot(ids){
  var s={}; ids.forEach(function(i){ var n=nodeByKeyNet(i); if(n&&netVisType(n)) s[i]=1; });
  for(var k in NET.nodeEls){ var el=NET.nodeEls[k]; el.classList.remove('nspot','nspotdim'); el.classList.add(s[k]?'nspot':'nspotdim'); }
  NET.edgeEls.forEach(function(l){ l.classList.toggle('nlit', !!(s[l._a]&&s[l._b])); });
}
function netClearSpot(){ for(var k in NET.nodeEls){ NET.nodeEls[k].classList.remove('nspot','nspotdim'); } NET.edgeEls.forEach(function(l){ l.classList.remove('nlit'); }); }
function nodeByKeyNet(k){ for(var i=0;i<NET.nodes.length;i++) if(NET.nodes[i].id===k) return NET.nodes[i]; return null; }

function netUpdate(){
  if(!NET.built) return;
  // visibilite type + anneau tete + etat selection/filtre
  var matched=TICKETS.filter(tkPasseTF);
  var keep={}; matched.forEach(function(t){t.selections.forEach(function(s){keep[eKey(s.joueur,s.pays,s.type)]=1;});});
  var anyF=tfCount()>0;
  NET.nodes.forEach(function(n){
    var g=NET.nodeEls[n.id]; if(!g)return;
    g.style.display=netVisType(n)?'':'none';
    g.classList.toggle('ntete', statusOf(n.name,n.pays,n.type)==='tete');
    g.classList.toggle('nsel', !!TF.joueurs[n.id]);
    g.classList.remove('ndim','nsat','nanchor','nspot','nspotdim');
    if(anyF){
      if(!keep[n.id]) g.classList.add('ndim');
      else if(TF.joueurs[n.id]||TF.pays[pKeyN(n.pays)]) g.classList.add('nanchor');
      else g.classList.add('nsat');
    }
  });
  NET.edgeEls.forEach(function(l){ l.classList.remove('nlit'); });
  document.getElementById('netCount').textContent=matched.length+' / '+TICKETS.length+' tickets';
  // liste tickets (survol = reseau du ticket)
  var rows=matched.map(function(t){ return {t:t, r:WC.computeTicket(t,P,PAYS,MISE,null)}; });
  rows.sort(function(a,b){ return (tkSortKey(a.r)-tkSortKey(b.r)) || (b.r.maxEnCours-a.r.maxEnCours); });
  var html=rows.map(function(o){ var t=o.t, r=o.r;
    var sels=t.selections.map(function(s){var on=TF.joueurs[eKey(s.joueur,s.pays,s.type)]; var lab=cap(s.joueur)+(s.type==='passeur'?' (P)':''); return on?('<b>'+lab+'</b>'):('<span class="pp">'+lab+'</span>');}).join(' + ');
    return '<div class="ntk" data-tid="'+t.id+'"><div class="ntk-h"><span>'+t.nom+'</span><span class="ntk-max">↑ '+fmt(r.maxEnCours)+'</span><span class="ntk-sys">'+t.systeme+'</span></div><div class="ntk-sels">'+sels+'</div></div>';
  }).join('');
  var list=document.getElementById('netList'); list.innerHTML=html||'<div class="empty">Aucun ticket</div>';
}

function netInitPanZoom(){
  var view=document.getElementById('netView'), svg=document.getElementById('netSvg'), tip=document.getElementById('netTip'), graph=document.getElementById('netGraph'), list=document.getElementById('netList');
  function apply(){ view.setAttribute('transform','translate('+NET.tx+','+NET.ty+') scale('+NET.sc+')'); }
  apply();
  var drag=false,sx,sy;
  svg.addEventListener('mousedown',function(e){drag=true;sx=e.clientX;sy=e.clientY;svg.style.cursor='grabbing';});
  window.addEventListener('mousemove',function(e){ if(!drag)return; NET.tx+=e.clientX-sx;NET.ty+=e.clientY-sy;sx=e.clientX;sy=e.clientY;apply();});
  window.addEventListener('mouseup',function(){drag=false;svg.style.cursor='grab';});
  svg.addEventListener('wheel',function(e){ e.preventDefault(); var rc=svg.getBoundingClientRect(),mx=e.clientX-rc.left,my=e.clientY-rc.top,f=e.deltaY<0?1.12:.89,ns=Math.min(6,Math.max(.3,NET.sc*f)),kk=ns/NET.sc; NET.tx=mx-(mx-NET.tx)*kk; NET.ty=my-(my-NET.ty)*kk; NET.sc=ns; apply(); },{passive:false});
  list.addEventListener('mouseover',function(e){ var d=e.target.closest('.ntk'); if(d&&d.dataset.tid){ var t=TICKETS.find(function(x){return x.id===d.dataset.tid;}); if(t) netSpot(t.selections.map(function(s){return eKey(s.joueur,s.pays,s.type);})); } });
  list.addEventListener('mouseleave',function(){ netClearSpot(); });
}
